<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SPACE JET — Arcade Shooter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #gameWrapper {
      position: relative;
      width: 480px;
      height: 720px;
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      image-rendering: pixelated;
    }

    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hud-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      color: rgba(0, 255, 200, 0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hud-value {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 900;
      color: #00ffc8;
      text-shadow: 0 0 10px #00ffc8, 0 0 20px rgba(0, 255, 200, 0.4);
    }

    #healthBar {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .heart {
      font-size: 14px;
      filter: drop-shadow(0 0 4px #ff4060);
    }

    .heart.empty {
      filter: grayscale(1) opacity(0.3);
    }

    #bossHpBar {
      position: absolute;
      bottom: 60px;
      left: 20px;
      right: 20px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    #bossLabel {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #ff4060;
      letter-spacing: 3px;
      text-align: center;
      text-shadow: 0 0 8px #ff4060;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.5
      }
    }

    #bossHpTrack {
      width: 100%;
      height: 10px;
      background: rgba(255, 64, 96, 0.15);
      border: 1px solid rgba(255, 64, 96, 0.5);
      border-radius: 2px;
      overflow: hidden;
    }

    #bossHpFill {
      height: 100%;
      background: linear-gradient(90deg, #ff1a40, #ff6080);
      box-shadow: 0 0 8px #ff4060;
      transition: width 0.1s;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(0, 10, 20, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
      z-index: 10;
    }

    #overlay.hidden {
      display: none;
    }

    .title-line {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 42px;
      color: #00ffc8;
      text-shadow: 0 0 20px #00ffc8, 0 0 40px rgba(0, 255, 200, 0.5);
      letter-spacing: 6px;
      line-height: 1;
    }

    .title-sub {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: rgba(0, 255, 200, 0.5);
      letter-spacing: 8px;
      margin-top: 6px;
      margin-bottom: 40px;
    }

    .score-display {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #ffcc00;
      text-shadow: 0 0 12px #ffcc00;
      margin-bottom: 8px;
    }

    .score-label {
      font-size: 10px;
      color: rgba(255, 204, 0, 0.6);
      letter-spacing: 3px;
      margin-bottom: 32px;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #000;
      background: #00ffc8;
      border: none;
      padding: 14px 40px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.15s;
      pointer-events: all;
      text-transform: uppercase;
    }

    .btn:hover {
      background: #fff;
      box-shadow: 0 0 20px #00ffc8;
      transform: scale(1.05);
    }

    .controls-hint {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      color: rgba(0, 255, 200, 0.35);
      letter-spacing: 2px;
    }

    #gunBarWrapper {
      position: absolute;
      bottom: 14px;
      left: 14px;
      right: 14px;
      pointer-events: none;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 10px;
    }

    #gunBarTop, #gunBarTop2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #gunNameLabel, #gunNameLabel2 {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 8px currentColor;
      transition: color 0.3s;
    }

    #gunTimerText, #gunTimerText2 {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
    }

    #gunTimerTrack, #gunTimerTrack2 {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    #gunTimerFill {
      height: 100%;
      border-radius: 2px;
      transition: background 0.3s;
    }

    #wave-announce {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', monospace;
      font-size: min(22px, 5vw);
      font-weight: 900;
      color: #ffcc00;
      text-shadow: 0 0 16px #ffcc00;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      white-space: pre-wrap;
      width: 90%;
      transition: opacity 0.3s;
      z-index: 5;
    }

    #fullscreenBtn {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #00ffc8;
      background: rgba(0, 255, 200, 0.1);
      border: 1px solid rgba(0, 255, 200, 0.3);
      padding: 8px 16px;
      cursor: pointer;
      pointer-events: all;
      margin-top: 14px;
      text-transform: uppercase;
      transition: all 0.15s;
      display: none;
    }

    #fullscreenBtn:hover {
      background: rgba(0, 255, 200, 0.2);
      box-shadow: 0 0 12px rgba(0, 255, 200, 0.3);
    }

    .mobile-hint {
      display: none;
    }

    #pauseBtnMain {
      display: none;
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 200, 0.1);
      border: 1px solid rgba(0, 255, 200, 0.4);
      color: #00ffc8;
      padding: 6px 14px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      z-index: 15;
      cursor: pointer;
      pointer-events: all;
      font-weight: 700;
      letter-spacing: 2px;
      border-radius: 2px;
    }

    @media (pointer: coarse),
    (max-width: 600px) {
      .desktop-hint {
        display: none;
      }

      .mobile-hint {
        display: inline;
      }

      #fullscreenBtn {
        display: inline-block;
      }

      #pauseBtnMain.visible {
        display: inline-block;
        top: 60px;
        left: 12px;
        transform: none;
      }
    }

    @media (max-width: 600px) {
      .title-line {
        font-size: 32px;
        letter-spacing: 4px;
      }

      .title-sub {
        font-size: 9px;
        letter-spacing: 5px;
      }

      .btn {
        font-size: 12px;
        padding: 12px 32px;
      }
    }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<body>
  <div id="gameWrapper">
    <canvas id="gameCanvas" width="480" height="720" tabindex="0"></canvas>

    <div id="ui">
      <div id="hud">
        <!-- Solo mode: single shared score. Co-op: per-player scores shown side by side -->
        <div class="hud-block" id="soloScoreBlock">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="scoreDisplay">0</span>
        </div>
        <div class="hud-block" id="coopScoreBlock" style="display:none;gap:10px;flex-direction:row;align-items:center">
          <div style="display:flex;flex-direction:column;align-items:center">
            <span class="hud-label" style="color:#44aaff">P1</span>
            <span class="hud-value" id="p1ScoreDisplay" style="color:#44aaff;font-size:0.85em">0</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center">
            <span class="hud-label" style="color:#ffcc00">P2</span>
            <span class="hud-value" id="p2ScoreDisplay" style="color:#ffcc00;font-size:0.85em">0</span>
          </div>
        </div>
        <div class="hud-block">
          <span class="hud-label">Kills</span>
          <span class="hud-value" id="killDisplay" style="color:#ff4060">0</span>
        </div>
        <div class="hud-block" style="align-items:center">
          <span class="hud-label" style="color:#00ffc8" id="p1HealthLabel">P1 Health</span>
          <div id="healthBar" style="display:flex;gap:4px"></div>
        </div>
        <div class="hud-block" style="align-items:center" id="p2HealthBlock">
          <span class="hud-label" style="color:#ffcc00">P2 Health</span>
          <div id="healthBar2" style="display:flex;gap:4px"></div>
        </div>
        <div class="hud-block" style="align-items:flex-end">
          <span class="hud-label">Wave</span>
          <span class="hud-value" id="waveDisplay">1</span>
        </div>
      </div>

      <div id="bossHpBar">
        <div id="bossLabel">⚠ BOSS INCOMING ⚠</div>
        <div id="bossHpTrack">
          <div id="bossHpFill"></div>
        </div>
      </div>
      <button id="pauseBtnMain" onclick="togglePause()">II PAUSE</button>
      <div id="gunBarWrapper">
        <div style="width: 48%; pointer-events:auto;" id="p1GunBlock">
          <div id="gunBarTop">
            <span id="gunNameLabel" style="color:#00ffc8">✦ P1 GUN</span>
            <span id="gunTimerText">BASE</span>
          </div>
          <div id="gunTimerTrack" style="background:rgba(0,255,200,0.2);">
            <div id="gunTimerFill" style="width:100%;height:100%;background:#00ffc8"></div>
          </div>
        </div>
        <div style="width: 48%; pointer-events:auto;" id="p2GunBlock">
          <div id="gunBarTop2">
            <span id="gunNameLabel2" style="color:#ffcc00">✦ P2 GUN</span>
            <span id="gunTimerText2">BASE</span>
          </div>
          <div id="gunTimerTrack2" style="background:rgba(255,204,0,0.2);">
            <div id="gunTimerFill2" style="width:100%;height:100%;background:#ffcc00"></div>
          </div>
        </div>
      </div>

    </div>

    <div id="overlay">
      <div class="title-line" id="titleLine1">SPACE</div>
      <div class="title-line" id="titleLine2">JET</div>
      <div class="title-sub" id="titleSub">ARCADE SHOOTER</div>
      <div class="score-display" id="finalScore" style="display:none">0</div>
      <div class="score-label" id="finalScoreLabel" style="display:none">FINAL SCORE</div>
      <!-- Co-op per-player breakdown -->
      <div id="finalCoopScores" style="display:none;width:100%;text-align:center;margin-bottom:6px">
        <div style="color:#44aaff;font-size:1.4em;font-weight:bold" id="finalP1Score">P1: 0</div>
        <div style="color:#ffcc00;font-size:1.4em;font-weight:bold;margin-top:4px" id="finalP2Score">P2: 0</div>
        <div style="color:#aaa;font-size:0.8em;margin-top:6px" id="finalWinner"></div>
      </div>
      <div class="score-display" id="finalKills" style="display:none;font-size:2em;margin-top:6px;color:#ff4060">0</div>
      <div class="score-label" id="finalKillsLabel" style="display:none">ENEMIES DESTROYED</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn" id="startBtn">SOLO MODE</button>
        <button class="btn" id="coopBtn" style="background:#ffcc00; color:#001122;">LOCAL CO-OP</button>
      </div>
      <button class="btn" id="onlineBtn" style="background:#ff4060; color:#fff; margin-top:14px;">ONLINE CO-OP</button>
      <button class="btn" id="menuBtn"
        style="display:none;background:transparent;color:#00ffc8;border:2px solid #00ffc8;margin-top:10px;font-size:11px;padding:10px 32px">⟵
        MENU</button>
      <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>
      <div class="controls-hint"><span class="desktop-hint">WASD / ARROWS — MOVE &nbsp;|&nbsp; AUTO-FIRE
          ENABLED</span><span class="mobile-hint">TOUCH &amp; DRAG TO MOVE &nbsp;|&nbsp; AUTO-FIRE</span></div>
    </div>

    <div id="wave-announce"></div>

    <div id="pauseOverlay"
      style="display:none; position:absolute; inset:0; background:rgba(0,10,20,0.85); z-index:20; flex-direction:column; align-items:center; justify-content:center; pointer-events:all;">
      <div class="title-line" style="font-size:32px; margin-bottom:30px;">PAUSED</div>
      <button class="btn" onclick="togglePause()">RESUME</button>
      <button class="btn"
        style="margin-top:20px; background:transparent; color:#00ffc8; border:2px solid #00ffc8; padding:10px 32px; font-size:11px;"
        onclick="togglePause(); returnToMenu();">QUIT TO MENU</button>
    </div>
    
    <div id="onlineLobby" style="display:none; position:absolute; inset:0; background:rgba(0,10,20,0.95); z-index:30; flex-direction:column; align-items:center; justify-content:center; pointer-events:all;">
       <div class="title-line" style="font-size:24px; margin-bottom:20px;">ONLINE CO-OP</div>
       <div id="lobbyStatus" style="color:#00ffc8; margin-bottom:20px; font-size:14px; text-align:center;">Initializing...</div>
       <input type="text" id="inviteLink" readonly style="width:80%; padding:14px; text-align:center; margin-bottom:10px; background:#000; color:#fff; border:2px solid #00ffc8; font-family:monospace; display:none;" onclick="this.select()">
       <button class="btn" id="copyLinkBtn" style="display:none; font-size:11px; padding:10px 20px;">COPY INVITE LINK</button>
       <button class="btn" id="cancelOnlineBtn" style="margin-top:40px; background:transparent; color:#ff4060; border:2px solid #ff4060; padding:10px 32px; font-size:11px;" onclick="cancelOnline()">CANCEL</button>
    </div>
  </div>

  <script>
    // ─── MULTIPLAYER DEFINITIONS ─────────────────────────────────
    let isHost = true;
    let isOnline = false;
    let peer = null;
    let peerConn = null;
    let netEvents = [];
    let onlineP2Inputs = { keys: {}, jX: 0, jY: 0, tA: false, s: false };
    let networkStateReady = false;
    let hostSeq = 0;       // Host increments on every snapshot send
    let clientLastSeq = 0; // Client tracks highest seq received to discard old packets
    let _prevEnemyData = []; // Enemy positions from last packet, for velocity estimation
    
    function cancelOnline() {
       if (peer) { peer.destroy(); peer = null; }
       if (peerConn) { peerConn.close(); peerConn = null; }
       isOnline = false; isHost = true;
       document.getElementById('onlineLobby').style.display = 'none';
       document.getElementById('overlay').classList.remove('hidden');
    }
    
    function initPeerHost() {
       isHost = true;
       isOnline = true;
       document.getElementById('overlay').classList.add('hidden');
       const lobby = document.getElementById('onlineLobby');
       lobby.style.display = 'flex';
       document.getElementById('lobbyStatus').textContent = 'Creating secure room...';
       
       peer = new Peer();
       peer.on('open', id => {
          const baseUrl = window.location.href.split('?')[0];
          const link = baseUrl + '?room=' + id;
          const input = document.getElementById('inviteLink');
          input.value = link;
          input.style.display = 'block';
          const copyBtn = document.getElementById('copyLinkBtn');
          copyBtn.style.display = 'inline-block';
          copyBtn.onclick = () => { navigator.clipboard.writeText(link); copyBtn.textContent = 'COPIED!'; };
          document.getElementById('lobbyStatus').textContent = 'Room created! Send link to P2.';
       });
       
       peer.on('connection', conn => {
          peerConn = conn;
          document.getElementById('lobbyStatus').textContent = 'Player 2 connected! Starting...';
          document.getElementById('inviteLink').style.display = 'none';
          document.getElementById('copyLinkBtn').style.display = 'none';
          
          peerConn.on('data', data => {
             if (data.t === 'i') {
                 onlineP2Inputs = data.p;
             }
          });
          
          setTimeout(() => {
             lobby.style.display = 'none';
             coopMode = true;
             startGame();
          }, 1000);
       });
       peer.on('error', err => {
          document.getElementById('lobbyStatus').textContent = 'Error: ' + err.message;
       });
    }

    function initPeerClient(roomId) {
       isHost = false;
       isOnline = true;
       coopMode = true;
       document.getElementById('overlay').classList.add('hidden');
       const lobby = document.getElementById('onlineLobby');
       lobby.style.display = 'flex';
       document.getElementById('lobbyStatus').textContent = 'Joining Room...';
       document.getElementById('inviteLink').style.display = 'none';
       document.getElementById('copyLinkBtn').style.display = 'none';
       
       peer = new Peer();
       peer.on('open', () => {
          document.getElementById('lobbyStatus').textContent = 'Connecting to Host...';
          // Use unreliable (UDP-like) DataChannel: no head-of-line blocking.
          // With reliable=false, a lost packet is simply skipped — the next one
          // arrives immediately instead of stalling behind retransmits.
          peerConn = peer.connect(roomId, { reliable: false, serialization: 'json' });
          peerConn.on('open', () => {
             document.getElementById('lobbyStatus').textContent = 'Connected! Waiting for host...';
             setTimeout(() => {
                 lobby.style.display = 'none';
                 startGame();
             }, 800);
          });
          peerConn.on('data', data => {
             if (data.t === 's') {
                 // Reject out-of-order packets (can arrive scrambled on unreliable channel)
                 if (data.seq !== undefined && data.seq <= clientLastSeq) return;
                 if (data.seq !== undefined) clientLastSeq = data.seq;
                 applyNetworkState(data.p);
             }
             else if (data.t === 'gO') { triggerGameOver(); }
             else if (data.t === 'p') { togglePause(true); }
          });
          peerConn.on('error', err => {
              document.getElementById('lobbyStatus').textContent = 'Connection Error: ' + err;
          });
       });
       peer.on('error', err => {
          document.getElementById('lobbyStatus').textContent = 'Error: ' + err.message;
       });
    }

    window.addEventListener('DOMContentLoaded', () => {
       const params = new URLSearchParams(window.location.search);
       if (params.has('room')) {
           initPeerClient(params.get('room'));
       }
    });

    // ─── CANVAS SETUP ──────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 480, H = 720;

    // ─── RESPONSIVE SCALING ───────────────────────────────────────
    let canvasScale = 1;

    function resizeGame() {
      const windowW = window.innerWidth;
      const windowH = window.innerHeight;
      const aspectRatio = W / H;
      let displayW, displayH;
      if (windowW / windowH < aspectRatio) {
        displayW = windowW;
        displayH = windowW / aspectRatio;
      } else {
        displayH = windowH;
        displayW = windowH * aspectRatio;
      }
      const wrapper = document.getElementById('gameWrapper');
      wrapper.style.width = displayW + 'px';
      wrapper.style.height = displayH + 'px';
      canvasScale = displayW / W;
    }

    function screenToCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) / canvasScale,
        y: (clientY - rect.top) / canvasScale
      };
    }

    window.addEventListener('resize', resizeGame);
    document.addEventListener('fullscreenchange', () => setTimeout(resizeGame, 100));
    resizeGame();

    // ─── GAME STATE ────────────────────────────────────────────────
    let gameRunning = false;
    let isPaused = false;

    function togglePause(fromNet = false) {
      if (!gameRunning) return;
      if (isOnline && !isHost && !fromNet) return; // Only host can pause initially
      
      isPaused = !isPaused;

      if (isOnline && isHost && peerConn && peerConn.open && !fromNet) {
          peerConn.send({ t: 'p' });
      }

      const pauseOverlay = document.getElementById('pauseOverlay');
      if (isPaused) {
        pauseOverlay.style.display = 'flex';
        if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
      } else {
        pauseOverlay.style.display = 'none';
        lastFrameTime = performance.now();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }
    }

    let score = 0;
    let kills = 0;

    function updateScoreHUD() {
      if (coopMode) {
        document.getElementById('soloScoreBlock').style.display  = 'none';
        document.getElementById('coopScoreBlock').style.display  = 'flex';
        document.getElementById('p1ScoreDisplay').textContent = players[0].score.toLocaleString();
        document.getElementById('p2ScoreDisplay').textContent = players[1].score.toLocaleString();
      } else {
        document.getElementById('soloScoreBlock').style.display  = '';
        document.getElementById('coopScoreBlock').style.display  = 'none';
        document.getElementById('scoreDisplay').textContent      = score.toLocaleString();
      }
    }
    let wave = 1;
    let frameCount = 0;
    let globalLaserTimer = 400;
    let animId = null;

    // ─── INPUT ─────────────────────────────────────────────────────
    const keys = {};
    let touchDX = 0, touchDY = 0, touchActive = false;
    let touchId = null, touchLastX = 0, touchLastY = 0;
    let joystickBaseX = 0, joystickBaseY = 0, joystickKnobX = 0, joystickKnobY = 0;
    let joystickVisible = false;

    document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code) && e.preventDefault(); if (e.code === 'Escape') togglePause(); });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (touchId === null) {
        const t = e.changedTouches[0];
        touchId = t.identifier;
        const pos = screenToCanvas(t.clientX, t.clientY);
        touchLastX = pos.x;
        touchLastY = pos.y;
        touchActive = true;
        touchDX = 0; touchDY = 0;
        joystickBaseX = pos.x;
        joystickBaseY = pos.y;
        joystickKnobX = pos.x;
        joystickKnobY = pos.y;
        joystickVisible = true;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === touchId) {
          const pos = screenToCanvas(t.clientX, t.clientY);
          touchDX += pos.x - touchLastX;
          touchDY += pos.y - touchLastY;
          touchLastX = pos.x;
          touchLastY = pos.y;
          joystickKnobX = pos.x;
          joystickKnobY = pos.y;
        }
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === touchId) {
          touchId = null; touchActive = false;
          touchDX = 0; touchDY = 0;
          joystickVisible = false;
        }
      }
    });

    canvas.addEventListener('touchcancel', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === touchId) {
          touchId = null; touchActive = false;
          touchDX = 0; touchDY = 0;
          joystickVisible = false;
        }
      }
    });

    // ─── SCROLLING BACKGROUND ──────────────────────────────────────
    const stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.3, speed: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.7 + 0.3 });
    }

    // Ground scroll layers (clouds/terrain)
    const groundLayers = [
      { y: 0, speed: 0.4, alpha: 0.12, color: '#4a7a50' },
      { y: -H, speed: 0.4, alpha: 0.12, color: '#4a7a50' },
      { y: 0, speed: 0.7, alpha: 0.07, color: '#6aaa70' },
      { y: -H, speed: 0.7, alpha: 0.07, color: '#6aaa70' },
    ];

    function makeTerrainCanvas(color) {
      const tc = document.createElement('canvas');
      tc.width = W; tc.height = H;
      const tx = tc.getContext('2d');
      tx.fillStyle = color;
      // Random patches based on theme
      if (currentMapTheme === 0) {
        // Earth/Jungle (ellipses)
        for (let i = 0; i < 30; i++) {
          tx.globalAlpha = Math.random() * 0.6 + 0.1;
          const rx = Math.random() * W, ry = Math.random() * H;
          const rw = Math.random() * 120 + 40, rh = Math.random() * 80 + 30;
          tx.beginPath();
          tx.ellipse(rx, ry, rw / 2, rh / 2, Math.random() * Math.PI, 0, Math.PI * 2);
          tx.fill();
        }
      } else if (currentMapTheme === 1) {
        // Ice Planet (sharp diamond crystals)
        tx.strokeStyle = color;
        tx.lineWidth = 2;
        for (let i = 0; i < 25; i++) {
          tx.globalAlpha = Math.random() * 0.5 + 0.2;
          const rx = Math.random() * W, ry = Math.random() * H;
          const size = Math.random() * 50 + 20;
          tx.beginPath();
          tx.moveTo(rx, ry - size);
          tx.lineTo(rx + size/2, ry);
          tx.lineTo(rx, ry + size);
          tx.lineTo(rx - size/2, ry);
          tx.closePath();
          if (Math.random() > 0.5) tx.fill(); else tx.stroke();
        }
      } else {
        // Cyber Void (Neon grid lines and hollow circles)
        tx.strokeStyle = color;
        for (let i = 0; i < 15; i++) {
          tx.globalAlpha = Math.random() * 0.6 + 0.1;
          const rx = Math.random() * W, ry = Math.random() * H;
          const bw = Math.random() * 150 + 50, bh = Math.random() * 150 + 50;
          tx.lineWidth = Math.random() > 0.5 ? 4 : 1;
          tx.strokeRect(rx - bw/2, ry - bh/2, bw, bh);
          tx.beginPath();
          tx.arc(rx, ry, bw/3, 0, Math.PI*2);
          tx.stroke();
        }
      }
      return tc;
    }
    let currentMapTheme = 0;
    const MAP_THEMES = [
      { sky1: '#0a1a28', sky2: '#152838', c1: '#3d6644', c2: '#5a8c60' }, // Earth/Jungle
      { sky1: '#0a1028', sky2: '#152038', c1: '#3d5966', c2: '#547d8c' }, // Glacial Ice
      { sky1: '#1a0a28', sky2: '#281538', c1: '#4a2866', c2: '#68408c' }, // Void/Nebula
    ];
    let terrainCanvases = [];
    let bgPlanets = [];
    
    function setMapTheme(index) {
      currentMapTheme = index % MAP_THEMES.length;
      const t = MAP_THEMES[currentMapTheme];
      terrainCanvases = [makeTerrainCanvas(t.c1), makeTerrainCanvas(t.c2)];
      
      bgPlanets = [];
      const numPlanets = Math.floor(Math.random() * 2) + 1; // 1 or 2
      for (let i = 0; i < numPlanets; i++) {
         bgPlanets.push({
             x: Math.random() * W,
             y: Math.random() * H - H/2,
             r: Math.random() * 40 + 30, // 30-70
             speed: Math.random() * 0.3 + 0.15, // Faster to simulate driving forward
             col1: ['#304050', '#203040', '#402030', '#302040'][Math.floor(Math.random() * 4)],
             col2: ['#102030', '#101520', '#201015', '#151020'][Math.floor(Math.random() * 4)],
             hasRing: Math.random() > 0.6,
             ringAngle: Math.random() * Math.PI,
             ringColor: 'rgba(255, 255, 255, 0.08)'
         });
      }
    }
    setMapTheme(0);

    // ─── PARTICLES ─────────────────────────────────────────────────
    const particles = [];

    function spawnExplosion(x, y, count = 18, big = false, fromNet = false) {
      if (isHost && isOnline && !fromNet) {
        netEvents.push({ t: 'exp', x, y, c: count, b: big });
      }
      const colors = ['#ff6020', '#ffcc00', '#ff3000', '#ffffff', '#ff9040'];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * (big ? 5 : 3) + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: Math.random() * (big ? 6 : 4) + 1,
          life: 1,
          decay: Math.random() * 0.04 + 0.02,
          color: colors[Math.floor(Math.random() * colors.length)],
          type: 'spark'
        });
      }
      // smoke
      for (let i = 0; i < (big ? 10 : 5); i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 1.5;
        particles.push({
          x: x + (Math.random() - 0.5) * 20,
          y: y + (Math.random() - 0.5) * 20,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.5,
          r: Math.random() * (big ? 20 : 12) + 8,
          life: 1,
          decay: Math.random() * 0.02 + 0.01,
          color: '#222',
          type: 'smoke'
        });
      }
    }

    function spawnHitEffect(x, y, fromNet = false) {
      if (isHost && isOnline && !fromNet) {
        netEvents.push({ t: 'hit', x, y });
      }
      for (let i = 0; i < 6; i++) {
        const angle = Math.random() * Math.PI * 2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * 3,
          vy: Math.sin(angle) * 3,
          r: 2, life: 1, decay: 0.1,
          color: '#ffffff',
          type: 'spark'
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.05;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life * (p.type === 'smoke' ? 0.35 : 0.9);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ─── BULLETS ───────────────────────────────────────────────────
    const playerBullets = [];
    const enemyBullets = [];
    const enemyLasers = [];

    function distToSegment(px, py, x1, y1, x2, y2) {
      const l2 = (x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1);
      if (l2 === 0) return Math.sqrt((px - x1) * (px - x1) + (py - y1) * (py - y1));
      let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
      t = Math.max(0, Math.min(1, t));
      const projX = x1 + t * (x2 - x1);
      const projY = y1 + t * (y2 - y1);
      return Math.sqrt((px - projX) * (px - projX) + (py - projY) * (py - projY));
    }

    function spawnEnemyLaser(x, y, tx, ty, width = 24, type = 'boss') {
      const dx = tx - x, dy = ty - y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const ex = x + (dx / len) * 2000;
      const ey = y + (dy / len) * 2000;
      enemyLasers.push({ x, y, ex, ey, warningTimer: 72, fireTimer: 20, width, type });
      playSfx('laserCharge');
    }

    function spawnPlayerBullet(x, y, vx = 0, vy = -24, type = 'normal', color = '#00ffc8', owner = 0) {
      playerBullets.push({ x, y, vx, vy, w: 4, h: 14, type, color, owner });
    }

    function spawnEnemyBullet(x, y, vx, vy, type = 'normal') {
      enemyBullets.push({ x, y, vx, vy, r: type === 'big' ? 6 : 4, type });
    }

    function updateBullets() {
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        if (b.type === 'rocket') {
          b.vy *= 1.08;
        } else if (b.type === 'homing_rocket') {
          let minDist = Infinity;
          let target = null;
          for (const e of enemies) {
            if (e.dead) continue;
            const dist = Math.hypot(e.x - b.x, e.y - b.y);
            if (dist < minDist) { minDist = dist; target = e; }
          }
          if (target) {
            const speed = Math.hypot(b.vx, b.vy) || 5;
            const targetAngle = Math.atan2(target.y - b.y, target.x - b.x);
            const currentAngle = Math.atan2(b.vy, b.vx);
            let diff = targetAngle - currentAngle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            const turnSpeed = 0.08;
            const newAngle = currentAngle + Math.max(-turnSpeed, Math.min(turnSpeed, diff));
            const newSpeed = Math.min(speed + 0.2, 12);
            b.vx = Math.cos(newAngle) * newSpeed;
            b.vy = Math.sin(newAngle) * newSpeed;
          } else {
            b.vy -= 0.2;
          }
        }
        b.x += b.vx; b.y += b.vy;
        if (b.y < -40 || b.x < -20 || b.x > W + 20 || b.y > H + 40) playerBullets.splice(i, 1);
      }
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.y > H + 20 || b.x < -20 || b.x > W + 20 || b.y < -20) enemyBullets.splice(i, 1);
      }
      for (let i = enemyLasers.length - 1; i >= 0; i--) {
        const L = enemyLasers[i];
        if (L.warningTimer > 0) {
          L.warningTimer--;
          if (L.warningTimer === 0) playSfx('laserFire');
        } else if (L.fireTimer > 0) {
          L.fireTimer--;
          players.forEach(p => {
            if (p.invincible <= 0) {
              const dist = distToSegment(p.x, p.y, L.x, L.y, L.ex, L.ey);
              if (dist < (L.width * 0.6)) {
                if (L.type === 'random') {
                  p.shields = 0;
                  p.shield = false;
                  p.hp = 0;
                  p.invincible = 60;
                  playSfx('playerHit');
                  spawnExplosion(p.x, p.y, 20);
                  updateHealthUI();
                  if (!p.dead) {
                    p.dead = true;
                    p.deathAnim = 0;
                  }
                } else {
                  if (p.shields > 0) {
                    p.shields = Math.max(0, p.shields - 3);
                    p.shield = p.shields > 0;
                    p.hp -= 3;
                  } else {
                    p.hp -= 3;
                  }

                  p.invincible = 60;
                  playSfx('playerHit');
                  spawnExplosion(p.x, p.y, 20);
                  updateHealthUI();

                  if (p.hp <= 0 && !p.dead) {
                    p.hp = 0;
                    p.dead = true;
                    p.deathAnim = 0;
                  }
                }
              }
            }
          });
        } else {
          enemyLasers.splice(i, 1);
        }
      }
    }

    function drawPlayerBullets() {
      for (const b of playerBullets) {
        if (b.type === 'rocket' || b.type === 'homing_rocket') {
          ctx.save();
          ctx.translate(b.x, b.y);
          if (b.type === 'homing_rocket') {
            ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI/2);
            ctx.shadowColor = '#ff2299'; ctx.shadowBlur = 10;
            ctx.fillStyle = '#ff2299'; ctx.beginPath(); ctx.roundRect(-3, -8, 6, 16, 3); ctx.fill();
            ctx.fillStyle = '#ffccff'; ctx.beginPath(); ctx.arc(0, 8 + Math.random() * 4, 3, 0, Math.PI * 2); ctx.fill();
          } else {
            ctx.shadowColor = '#ff2222'; ctx.shadowBlur = 12;
            ctx.fillStyle = '#ff2222'; ctx.beginPath(); ctx.roundRect(-4, -12, 8, 24, 4); ctx.fill();
            ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(0, 12 + Math.random() * 6, 4, 0, Math.PI * 2); ctx.fill();
          }
          ctx.restore();
        } else {
          ctx.shadowColor = b.color;
          ctx.shadowBlur = 10;
          const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
          grad.addColorStop(0, '#ffffff');
          grad.addColorStop(0.4, b.color);
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.roundRect(b.x - b.w / 2, b.y - b.h, b.w, b.h, 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
    }

    function drawPlayerLaser() {
      if (!gameRunning) return;
      players.forEach(p => {
        if (p.dead || p.gunLevel !== 4) return;
        const startY = p.y - p.h / 2;
        const endY = p.laserTargetY || 0;
        ctx.save();
        const flutter = Math.random() * 4 - 2;
        const w = 12 + flutter;
        ctx.shadowColor = '#ff8800';
        ctx.shadowBlur = 15 + Math.random() * 10;
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(p.x - w / 2, endY, w, startY - endY);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(p.x - (w - 6) / 2, endY, w - 6, startY - endY);
        ctx.restore();
      });
    }

    function drawEnemyBullets() {
      for (const b of enemyBullets) {
        ctx.shadowColor = b.type === 'big' ? '#ff4060' : '#ff8020';
        ctx.shadowBlur = 8;
        ctx.fillStyle = b.type === 'big' ? '#ff2040' : '#ffaa40';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        // inner bright core
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function drawEnemyLasers() {
      for (const L of enemyLasers) {
        if (L.warningTimer > 0) {
          ctx.save();
          ctx.globalAlpha = 0.3 + 0.3 * Math.sin(L.warningTimer * 0.5);
          ctx.strokeStyle = '#ff0033';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(L.x, L.y);
          ctx.lineTo(L.ex, L.ey);
          ctx.stroke();
          if (L.width >= 50) {
            ctx.fillStyle = '#ff0033';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚠', L.x, 30);
          }
          ctx.restore();
        } else if (L.fireTimer > 0) {
          ctx.save();
          ctx.shadowColor = '#ff2040';
          ctx.shadowBlur = L.width * 0.6;
          ctx.strokeStyle = '#ff2040';
          ctx.lineWidth = L.width * (L.fireTimer / 20);
          ctx.beginPath();
          ctx.moveTo(L.x, L.y);
          ctx.lineTo(L.ex, L.ey);
          ctx.stroke();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = (L.width * 0.4) * (L.fireTimer / 20);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    // ─── PLAYERS ───────────────────────────────────────────────────
    const players = [
      {
        id: 1, color: '#44aaff',
        x: W / 2 - 40, y: H - 100,
        w: 36, h: 44, speed: 9,
        hp: 6, maxHp: 6,
        score: 0, kills: 0,
        shootTimer: 0, shootInterval: 14,
        invincible: 0, thrustAnim: 0, bankAngle: 0,
        gunLevel: 1, baseGunLevel: 1, gunTimer: 0,
        shield: false, shieldAnim: 0, shields: 0,
        dead: false, deathAnim: 0, laserTargetY: 0
      },
      {
        id: 2, color: '#ffcc00',
        x: W / 2 + 40, y: H - 100,
        w: 36, h: 44, speed: 9,
        hp: 6, maxHp: 6,
        score: 0, kills: 0,
        shootTimer: 0, shootInterval: 14,
        invincible: 0, thrustAnim: 0, bankAngle: 0,
        gunLevel: 1, baseGunLevel: 1, gunTimer: 0,
        shield: false, shieldAnim: 0, shields: 0,
        dead: false, deathAnim: 0, laserTargetY: 0
      }
    ];

    function resetPlayer() {
      players.forEach((p, i) => {
        p.x = W / 2 + (i === 0 ? -40 : 40); p.y = H - 100;
        p.hp = 6; p.maxHp = 6;
        p.shootTimer = 0;
        p.invincible = 0;
        p.gunLevel = 1;
        p.baseGunLevel = 1;
        p.gunTimer = 0;
        p.shield = false;
        p.shieldAnim = 0;
        p.shields = 0;
        p.dead = false;
        p.deathAnim = 0;
        p.laserTargetY = 0;
      });
      updateGunUI();
    }

    function updatePlayer() {
      if (!gameRunning) return;
      players.forEach((p, i) => {
        if (p.dead) {
          p.deathAnim++;
          let explodeRate = Math.max(2, 10 - Math.floor(p.deathAnim / 12));
          
          if (p.deathAnim % explodeRate === 0 && p.deathAnim < 110) {
            spawnExplosion(p.x + (Math.random() - 0.5) * 60, p.y + (Math.random() - 0.5) * 60, Math.random() * 20 + 10, false);
            if (Math.random() < 0.4) playSfx('enemyHit');
          }
          
          if (p.deathAnim === 115) {
            spawnExplosion(p.x, p.y, 150, true);
            spawnExplosion(p.x - 30, p.y + 20, 100, true);
            spawnExplosion(p.x + 30, p.y - 10, 120, true);
            playSfx('enemyDie');
          }
          
          if (p.deathAnim === 120 && players[0].dead && players[1].dead) triggerGameOver();
          return;
        }
        
        let dx = 0, dy = 0;
        if (i === 0) {
          // Player 1 — WASD only
          if (keys['KeyA']) dx -= 1;
          if (keys['KeyD']) dx += 1;
          if (keys['KeyW']) dy -= 1;
          if (keys['KeyS']) dy += 1;

          if (touchActive) {
            p.x += touchDX;
            p.y += touchDY;
          }
        } else {
          if (isOnline && isHost) {
            // Online P2: inputs arrive from the client over the network
            const op2 = onlineP2Inputs.keys || {};
            if (op2['KeyA'] || op2['ArrowLeft'])  dx -= 1;
            if (op2['KeyD'] || op2['ArrowRight']) dx += 1;
            if (op2['KeyW'] || op2['ArrowUp'])    dy -= 1;
            if (op2['KeyS'] || op2['ArrowDown'])  dy += 1;

            if (onlineP2Inputs.tA) {
               p.x += onlineP2Inputs.tX || 0;
               p.y += onlineP2Inputs.tY || 0;
            }
          } else {
            // Local co-op Player 2 — Arrow keys only
            if (keys['ArrowLeft'])  dx -= 1;
            if (keys['ArrowRight']) dx += 1;
            if (keys['ArrowUp'])    dy -= 1;
            if (keys['ArrowDown'])  dy += 1;
          }
        }

        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

        p.x += dx * p.speed;
        p.y += dy * p.speed;

        p.x = Math.max(p.w / 2, Math.min(W - p.w / 2, p.x));
        p.y = Math.max(p.h / 2, Math.min(H - p.h / 2, p.y));

        // Banking animation: tilt toward direction of horizontal movement
        const targetBank = dx * 0.38; // max ~22 degrees at full speed
        p.bankAngle = p.bankAngle + (targetBank - p.bankAngle) * 0.12;

        p.shootTimer--;
        if (p.shootTimer <= 0) {
          p.shootTimer = p.shootInterval;
          firePlayerGuns(p);
        }

        p.thrustAnim++;
        if (p.invincible > 0) p.invincible--;

        if (p.gunTimer > 0) {
          p.gunTimer--;
          if (p.gunTimer === 0) {
            p.gunLevel = p.baseGunLevel || 1;
            p.shootInterval = GUNS[p.gunLevel].interval;
            showWaveAnnounce('GUN EXPIRED!');
            playSfx('gunExpire');
          }
          updateGunUI();
        }
      });
    }

    // ─── GUN DEFINITIONS ──────────────────────────────────────────
    const GUNS = {
      1: { name: 'SINGLE SHOT', color: '#00ffc8', dropRate: 0, interval: 14 },
      2: { name: 'TWIN SHOT', color: '#88ff44', dropRate: 0.35, interval: 13 },
      3: { name: 'SPREAD SHOT', color: '#ffcc00', dropRate: 0.03, interval: 13 },
      4: { name: 'LASER', color: '#ff8800', dropRate: 0.10, interval: 10 },
      5: { name: 'STORM SHOT', color: '#ff44cc', dropRate: 0.05, interval: 9 },
      6: { name: 'ROCKET SALVO', color: '#ff2222', dropRate: 0.03, interval: 30 },
      7: { name: 'HOMING MISSILES', color: '#ff00ff', dropRate: 0.03, interval: 25 },
    };
    const GUN_DURATION = 15 * 60; // 15 seconds in frames

    function firePlayerGuns(p) {
      if (p.dead) return;
      const gl = p.gunLevel;
      const owner = players.indexOf(p); // 0 for P1, 1 for P2
      if (gl === 7) {
        playSfx('shootHoming');
      } else if (gl === 6) {
        playSfx('rocketShoot');
      } else if (gl === 5) {
        if (frameCount % 4 === 0) playSfx('shootStorm');
      } else if (gl === 4) {
        playSfx('laserShoot');
      } else if (gl === 3) {
        if (frameCount % 6 === 0) playSfx('shootSpread');
      } else if (gl === 2) {
        if (frameCount % 6 === 0) playSfx('shootTwin');
      } else {
        if (frameCount % 6 === 0) playSfx('shoot');
      }
      const x = p.x, y = p.y - p.h / 2;
      const bulletColor = p.color;
      if (gl === 1) {
        spawnPlayerBullet(x, y, 0, -24, 'normal', bulletColor, owner);
      } else if (gl === 2) {
        spawnPlayerBullet(x - 10, y, 0, -24, 'normal', bulletColor, owner);
        spawnPlayerBullet(x + 10, y, 0, -24, 'normal', bulletColor, owner);
      } else if (gl === 3) {
        spawnPlayerBullet(x, y, 0, -24, 'normal', bulletColor, owner);
        spawnPlayerBullet(x - 10, y, -2.5, -23.8, 'normal', bulletColor, owner);
        spawnPlayerBullet(x + 10, y, 2.5, -23.8, 'normal', bulletColor, owner);
      } else if (gl === 4) {
        // Continuous beam handles own collision natively
      } else if (gl === 5) {
        spawnPlayerBullet(x, y, 0, -24, 'normal', bulletColor, owner);
        spawnPlayerBullet(x - 12, y, -2.5, -23.8, 'normal', bulletColor, owner);
        spawnPlayerBullet(x + 12, y, 2.5, -23.8, 'normal', bulletColor, owner);
        spawnPlayerBullet(x - 22, y, -5.0, -23.5, 'normal', bulletColor, owner);
        spawnPlayerBullet(x + 22, y, 5.0, -23.5, 'normal', bulletColor, owner);
      } else if (gl === 6) {
        spawnPlayerBullet(x - 14, y, 0, -5, 'rocket', bulletColor, owner);
        spawnPlayerBullet(x + 14, y, 0, -5, 'rocket', bulletColor, owner);
      } else if (gl === 7) {
        spawnPlayerBullet(x - 12, y, -2, -5, 'homing_rocket', bulletColor, owner);
        spawnPlayerBullet(x + 12, y, 2, -5, 'homing_rocket', bulletColor, owner);
      }
    }

    function updateGunUI() {
      // P1 UI
      const g1 = GUNS[players[0].gunLevel];
      const isBase1 = players[0].gunTimer === 0;
      const maxTimer1 = players[0].gunLevel === 4 ? 600 : GUN_DURATION;
      const pct1 = isBase1 ? 100 : (players[0].gunTimer / maxTimer1 * 100);
      const secs1 = isBase1 ? '—' : Math.ceil(players[0].gunTimer / 60) + 's';
      document.getElementById('gunNameLabel').textContent = '✦ ' + g1.name;
      document.getElementById('gunNameLabel').style.color = g1.color;
      document.getElementById('gunTimerText').textContent = isBase1 ? 'BASE' : secs1;
      document.getElementById('gunTimerFill').style.width = pct1 + '%';
      document.getElementById('gunTimerFill').style.background = g1.color;
      const warn1 = !isBase1 && players[0].gunTimer < 300;
      document.getElementById('gunTimerFill').style.opacity = warn1 && Math.floor(frameCount / 8) % 2 === 0 ? '0.4' : '1';

      // P2 UI
      const g2 = GUNS[players[1].gunLevel];
      const isBase2 = players[1].gunTimer === 0;
      const maxTimer2 = players[1].gunLevel === 4 ? 600 : GUN_DURATION;
      const pct2 = isBase2 ? 100 : (players[1].gunTimer / maxTimer2 * 100);
      const secs2 = isBase2 ? '—' : Math.ceil(players[1].gunTimer / 60) + 's';
      const label2 = document.getElementById('gunNameLabel2');
      if (label2) {
        label2.textContent = '✦ ' + g2.name;
        label2.style.color = g2.color;
        document.getElementById('gunTimerText2').textContent = isBase2 ? 'BASE' : secs2;
        document.getElementById('gunTimerFill2').style.width = pct2 + '%';
        document.getElementById('gunTimerFill2').style.background = g2.color;
        const warn2 = !isBase2 && players[1].gunTimer < 300;
        document.getElementById('gunTimerFill2').style.opacity = warn2 && Math.floor(frameCount / 8) % 2 === 0 ? '0.4' : '1';
      }
    }

    // ─── SOUND EFFECTS ────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSfx(type, fromNet = false) {
      if (isHost && isOnline && !fromNet) {
        netEvents.push({ t: 'sfx', n: type });
      }
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const g = audioCtx.createGain();
      g.connect(audioCtx.destination);
      const now = audioCtx.currentTime;

      if (type === 'shoot') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        o.frequency.setValueAtTime(880, now); o.frequency.exponentialRampToValueAtTime(440, now + 0.08);
        o.type = 'square'; o.start(now); o.stop(now + 0.08);

      } else if (type === 'rocketShoot') {
        const o = audioCtx.createOscillator();
        const noise = audioCtx.createBufferSource();
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
        noise.buffer = buf;
        noise.connect(g);
        o.connect(g);
        g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(40, now + 0.2);
        o.type = 'sawtooth';
        o.start(now); o.stop(now + 0.2);
        noise.start(now);

      } else if (type === 'laserShoot') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        o.frequency.setValueAtTime(1200, now); o.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 0.1);

      } else if (type === 'shootTwin') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        o.frequency.setValueAtTime(1100, now); o.frequency.exponentialRampToValueAtTime(550, now + 0.1);
        o.type = 'square'; o.start(now); o.stop(now + 0.1);

      } else if (type === 'shootSpread') {
        const o1 = audioCtx.createOscillator(); const o2 = audioCtx.createOscillator();
        o1.connect(g); o2.connect(g);
        g.gain.setValueAtTime(0.06, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        o1.frequency.setValueAtTime(800, now); o1.frequency.exponentialRampToValueAtTime(400, now + 0.12);
        o2.frequency.setValueAtTime(830, now); o2.frequency.exponentialRampToValueAtTime(410, now + 0.12);
        o1.type = 'triangle'; o2.type = 'triangle';
        o1.start(now); o2.start(now); o1.stop(now + 0.12); o2.stop(now + 0.12);

      } else if (type === 'shootStorm') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.07, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        o.frequency.setValueAtTime(600, now); o.frequency.exponentialRampToValueAtTime(300, now + 0.06);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 0.06);

      } else if (type === 'shootHoming') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        o.frequency.setValueAtTime(400, now); o.frequency.linearRampToValueAtTime(1200, now + 0.1); o.frequency.exponentialRampToValueAtTime(300, now + 0.25);
        o.type = 'sine'; o.start(now); o.stop(now + 0.25);

      } else if (type === 'enemyShoot') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.02, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        o.frequency.setValueAtTime(400, now); o.frequency.exponentialRampToValueAtTime(200, now + 0.08);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 0.08);

      } else if (type === 'laserFire') {
        const o = audioCtx.createOscillator();
        const o2 = audioCtx.createOscillator();
        o.connect(g); o2.connect(g);
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        o.frequency.setValueAtTime(80, now); o.frequency.linearRampToValueAtTime(30, now + 0.5);
        o2.frequency.setValueAtTime(600, now); o2.frequency.exponentialRampToValueAtTime(150, now + 0.5);
        o.type = 'sawtooth'; o2.type = 'square';
        o.start(now); o.stop(now + 0.5);
        o2.start(now); o2.stop(now + 0.5);

      } else if (type === 'laserCharge') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.01, now);
        g.gain.linearRampToValueAtTime(0.1, now + 1.2);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.25);
        o.frequency.setValueAtTime(100, now); o.frequency.exponentialRampToValueAtTime(600, now + 1.2);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 1.25);

      } else if (type === 'enemyHit') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        o.frequency.setValueAtTime(300, now); o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 0.1);

      } else if (type === 'enemyDie') {
        // Explosion crunch
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.5);
        const src = audioCtx.createBufferSource();
        src.buffer = buf; src.connect(g);
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        src.start(now);

      } else if (type === 'playerHit') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.25, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        o.frequency.setValueAtTime(200, now); o.frequency.exponentialRampToValueAtTime(60, now + 0.4);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 0.4);

      } else if (type === 'invinciblePickup') {
        [330, 440, 550, 660, 880].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.06;
          g2.gain.setValueAtTime(0.18, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
          o.frequency.value = f; o.type = 'triangle';
          o.start(t); o.stop(t + 0.18);
        });

      } else if (type === 'shieldPickup') {
        [300, 500, 700].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.08;
          g2.gain.setValueAtTime(0.18, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          o.frequency.value = f; o.type = 'sine';
          o.start(t); o.stop(t + 0.2);
        });

      } else if (type === 'shieldBreak') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 0.8);
        const src = audioCtx.createBufferSource();
        const flt = audioCtx.createBiquadFilter();
        flt.type = 'bandpass'; flt.frequency.value = 2000;
        src.buffer = buf; src.connect(flt); flt.connect(g);
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        src.start(now);

      } else if (type === 'gunPickup') {
        // Rising arpeggio
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.07;
          g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          o.frequency.value = f; o.type = 'triangle';
          o.start(t); o.stop(t + 0.15);
        });

      } else if (type === 'gunExpire') {
        // Descending tones
        [600, 400, 200].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.1;
          g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          o.frequency.value = f; o.type = 'square';
          o.start(t); o.stop(t + 0.15);
        });

      } else if (type === 'heartPickup') {
        [440, 880].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.1;
          g2.gain.setValueAtTime(0.2, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          o.frequency.value = f; o.type = 'sine';
          o.start(t); o.stop(t + 0.2);
        });

      } else if (type === 'bossAlarm') {
        const o = audioCtx.createOscillator();
        o.connect(g); g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        o.frequency.setValueAtTime(150, now); o.frequency.setValueAtTime(200, now + 0.15);
        o.frequency.setValueAtTime(150, now + 0.3); o.frequency.setValueAtTime(200, now + 0.45);
        o.type = 'sawtooth'; o.start(now); o.stop(now + 0.6);

      } else if (type === 'gameOver') {
        [400, 300, 200, 100].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g2 = audioCtx.createGain();
          o.connect(g2); g2.connect(audioCtx.destination);
          const t = now + i * 0.18;
          g2.gain.setValueAtTime(0.2, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o.frequency.value = f; o.type = 'sawtooth';
          o.start(t); o.stop(t + 0.3);
        });
      }
    }

    // ─── BACKGROUND MUSIC ─────────────────────────────────────────
    let musicNodes = [];
    let currentMusicMode = 'regular';
    let musicPlaying = false;

    function startMusic(mode = 'regular') {
      if (musicPlaying && currentMusicMode === mode) return;
      if (musicPlaying) stopMusic(); // Hard cut

      currentMusicMode = mode;
      musicPlaying = true;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const masterGain = audioCtx.createGain();
      masterGain.gain.value = mode.startsWith('boss') ? 0.22 : 0.18; // push the boss volume up slightly
      masterGain.connect(audioCtx.destination);
      musicNodes.push(masterGain);

      // BPM & timing
      const BPM = mode.startsWith('boss') ? 145 : 132;
      const beat = 60 / BPM;
      const bar  = beat * 4;

      // ── Bass line ──────────────────────────────────────────────────
      // Regular: sawtooth octave-pump in E minor — E1-E2-B1 power 5th
      let bassNotes = [41.20, 0, 82.41, 41.20, 61.74, 0, 82.41, 0];
      if (mode === 'boss')       bassNotes = [41.20, 41.20, 49.00, 41.20, 41.20, 41.20, 55.00, 41.20];
      else if (mode === 'boss2') bassNotes = [36.71, 36.71, 0, 41.20, 49.00, 49.00, 0, 36.71];
      else if (mode === 'boss3') bassNotes = [32.70, 49.00, 32.70, 0, 32.70, 49.00, 32.70, 55.00];

      function scheduleBass(startTime) {
        if (!musicPlaying) return;
        bassNotes.forEach((freq, i) => {
          if (freq === 0) return;
          const t = startTime + (mode.startsWith('boss') ? i * beat * 0.25 : i * beat * 0.5);
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(masterGain);
          o.type = mode.startsWith('boss') ? 'square' : 'sawtooth';
          o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.65, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + (mode.startsWith('boss') ? beat * 0.3 : beat * 0.45));
          o.start(t); o.stop(t + (mode.startsWith('boss') ? beat * 0.3 : beat * 0.45));
          musicNodes.push(o, g);
        });
        const next = startTime + (mode.startsWith('boss') ? beat * 2 : bar);
        setTimeout(() => scheduleBass(next), (next - audioCtx.currentTime - 0.1) * 1000);
      }

      // ── Melody (heroic 2-bar fanfare in E minor) ───────────────────
      // Bar 1: E4·G4·B4·G4·E4  |  Bar 2: A4·G4·E4·D4·E4 (ascending rise, resolving descent)
      let melodyNotes = [329.63, 0, 392.00, 0, 493.88, 392.00, 329.63, 0,
                         440.00, 0, 392.00, 0, 329.63, 0, 293.66, 329.63];
      if (mode === 'boss')       melodyNotes = [0, 493.88, 0, 466.16, 0, 440.00, 0, 415.30];
      else if (mode === 'boss2') melodyNotes = [0, 587.33, 0, 659.25, 0, 0, 587.33, 659.25];
      else if (mode === 'boss3') melodyNotes = [523.25, 0, 659.25, 0, 783.99, 0, 659.25, 0];

      function scheduleMelody(startTime) {
        if (!musicPlaying) return;
        melodyNotes.forEach((freq, i) => {
          if (freq === 0) return;
          const t = startTime + i * beat * 0.5;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(masterGain);
          o.type = mode.startsWith('boss') ? 'sawtooth' : 'square';
          o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(mode.startsWith('boss') ? 0.4 : 0.28, t + 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, t + (mode.startsWith('boss') ? beat * 2 : beat * 1.1));
          o.start(t); o.stop(t + (mode.startsWith('boss') ? beat * 2 : beat * 1.1));
          musicNodes.push(o, g);
        });
        const next = startTime + (mode.startsWith('boss') ? bar : bar * 2);
        setTimeout(() => scheduleMelody(next), (next - audioCtx.currentTime - 0.1) * 1000);
      }

      // ── Arp / counter-melody ───────────────────────────────────────
      // Regular: E minor hexatonic — E3-G3-B3-E4-G4-E4-B3-G3 (flowing loop)
      let arpNotes = [164.81, 196.00, 246.94, 329.63, 392.00, 329.63, 246.94, 196.00];
      if (mode === 'boss')       arpNotes = [440, 523.2, 587.3, 659.3, 587.3, 523.2, 440, 392];
      else if (mode === 'boss2') arpNotes = [587.3, 698.46, 880, 1046.5, 880, 698.46, 587.3, 523.25];
      else if (mode === 'boss3') arpNotes = [392, 493.88, 587.33, 783.99, 587.33, 493.88, 392, 329.63];

      function scheduleArp(startTime) {
        if (!musicPlaying) return;
        arpNotes.forEach((freq, i) => {
          const t = startTime + (mode.startsWith('boss') ? i * beat * 0.25 : (i % 8) * beat * 0.333);
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(masterGain);
          o.type = mode.startsWith('boss') ? 'sawtooth' : 'sine';
          o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.18, t + 0.04);
          g.gain.exponentialRampToValueAtTime(0.001, t + beat * 0.28);
          o.start(t); o.stop(t + beat * 0.28);
          musicNodes.push(o, g);
        });
        const next = startTime + (mode.startsWith('boss') ? beat * 2 : bar);
        setTimeout(() => scheduleArp(next), (next - audioCtx.currentTime - 0.1) * 1000);
      }

      // ── Kick drum ──────────────────────────────────────────────────
      function scheduleKick(startTime) {
        if (!musicPlaying) return;
        // Regular: 4-on-the-floor march (every beat) — drives the heroic momentum
        let kickOffsets = [0, beat, beat * 2, beat * 3];
        if (mode === 'boss')       kickOffsets = [0, beat * 0.5, beat * 1.5, beat * 2, beat * 2.5, beat * 3.5];
        else if (mode === 'boss2') kickOffsets = [0, beat * 1.0, beat * 1.5, beat * 2.5, beat * 3.0, beat * 3.5];
        else if (mode === 'boss3') kickOffsets = [0, beat * 0.75, beat * 1.5, beat * 2.25, beat * 3.0, beat * 3.75];

        kickOffsets.forEach(offset => {
          const t = startTime + offset;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(masterGain);
          o.type = 'sine';
          o.frequency.setValueAtTime(mode.startsWith('boss') ? 140 : 110, t);
          o.frequency.exponentialRampToValueAtTime(0.001, t + 0.4);
          g.gain.setValueAtTime(1.1, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o.start(t); o.stop(t + 0.4);
          musicNodes.push(o, g);
        });
        const next = startTime + bar;
        setTimeout(() => scheduleKick(next), (next - audioCtx.currentTime - 0.1) * 1000);
      }

      // ── Hi-hat ─────────────────────────────────────────────────────
      function scheduleHat(startTime) {
        if (!musicPlaying) return;
        const count = mode.startsWith('boss') ? 16 : 8;
        for (let i = 0; i < count; i++) {
          const t = startTime + (mode.startsWith('boss') ? i * beat * 0.25 : i * beat * 0.5 + (i % 2 === 1 ? 0.02 : 0));
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);
          const src = audioCtx.createBufferSource();
          const g   = audioCtx.createGain();
          const filter = audioCtx.createBiquadFilter();
          filter.type = 'highpass';
          filter.frequency.value = mode.startsWith('boss') ? 4000 : 7000; // crisp clean hat for heroic
          src.buffer = buf;
          src.connect(filter); filter.connect(g); g.connect(masterGain);
          g.gain.setValueAtTime(mode.startsWith('boss') ? 0.2 : 0.12, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
          src.start(t);
          musicNodes.push(src, g, filter);
        }
        const next = startTime + bar;
        setTimeout(() => scheduleHat(next), (next - audioCtx.currentTime - 0.1) * 1000);
      }

      const start = audioCtx.currentTime + 0.1;
      scheduleBass(start);
      scheduleMelody(start);
      scheduleArp(start + bar);
      scheduleKick(start);
      scheduleHat(start);
    }

    function stopMusic() {
      musicPlaying = false;
      musicNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch (e) { } });
      musicNodes = [];
    }
    const gunDrops = [];

    function tryDropGun(x, y) {
      // Only pause drops if ALL living players have active guns
      const activePlayers = players.filter(p => !p.dead);
      if (activePlayers.length > 0 && activePlayers.every(p => p.gunTimer >= 180)) return false;

      const baseLvl = Math.max((players[0].baseGunLevel || 1), (players[1].baseGunLevel || 1));
      const rolls = [
        { level: 7, rate: 0.02 },
        { level: 6, rate: 0.03 },
        { level: 5, rate: 0.03 },
        { level: 4, rate: 0.06 },
        { level: 3, rate: 0.03 },
        { level: 2, rate: 0.15 },
      ].filter(r => r.level > baseLvl);
      
      for (const r of rolls) {
        if (Math.random() < r.rate) {
          gunDrops.push({ x, y, vy: 1.2, level: r.level, life: 1.0 });
          return true;
        }
      }
      return false;
    }

    function updateGunDrops() {
      for (let i = gunDrops.length - 1; i >= 0; i--) {
        const d = gunDrops[i];
        d.y += d.vy;
        d.life -= 0.00111; // fade over ~15s
        if (d.life <= 0 || d.y > H + 20) { gunDrops.splice(i, 1); continue; }
        // Collect
        let collected = false;
        players.forEach(p => {
          if (p.dead || collected) return;
          if (Math.abs(d.x - p.x) < 22 && Math.abs(d.y - p.y) < 22) {
            
            // Apply weapon logically to whoever is active
            players.forEach(target => {
              if (target.dead) return;
              if (coopMode || target === p) {
                target.gunLevel = d.level;
                target.gunTimer = d.level === 4 ? 600 : GUN_DURATION;
                target.shootInterval = GUNS[d.level].interval;
              }
            });
            
            updateGunUI();
            playSfx('gunPickup');
            showWaveAnnounce('✦ ' + GUNS[d.level].name + ' !');
            collected = true;
          }
        });
        
        if (collected) {
           gunDrops.length = 0;
           break;
        }
      }
    }

    function drawGunDrops() {
      for (const d of gunDrops) {
        const g = GUNS[d.level];
        const icons = ['', '▲', '▲▲', '❋', '⚡', '★', '🚀', '🎯'];
        ctx.save();
        ctx.globalAlpha = d.life;
        ctx.translate(d.x, d.y);
        ctx.shadowColor = g.color; ctx.shadowBlur = 14;
        // Background pill
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
        // Border
        ctx.strokeStyle = g.color; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.stroke();
        // Icon
        ctx.shadowBlur = 0;
        ctx.fillStyle = g.color;
        ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(icons[d.level], 0, 1);
        // Level pip
        ctx.font = 'bold 7px sans-serif';
        ctx.fillStyle = '#000';
        ctx.fillText(d.level, 8, -8);
        ctx.restore();
      }
    }

    // ─── SHIELD DROP SYSTEM ───────────────────────────────────────
    const shieldDrops = [];

    function tryDropShield(x, y) {
      if (Math.random() < 0.10) {
        shieldDrops.push({ x, y, vy: 1.0, life: 1.0 });
        return true;
      }
      return false;
    }

    function updateShieldDrops() {
      for (let i = shieldDrops.length - 1; i >= 0; i--) {
        const s = shieldDrops[i];
        s.y += s.vy;
        s.life -= 0.00111; // ~15s fade
        if (s.life <= 0 || s.y > H + 20) { shieldDrops.splice(i, 1); continue; }
        players.forEach(p => {
          if (p.dead) return;
          if (Math.abs(s.x - p.x) < 22 && Math.abs(s.y - p.y) < 22) {
            if (p.shields < p.maxHp) {
              p.shields++;
              p.shield = p.shields > 0;
            }
            updateHealthUI();
            playSfx('shieldPickup');
            showWaveAnnounce('🛡 SHIELD ACTIVE!');
            shieldDrops.splice(i, 1);
          }
        });
      }
    }

    function drawShieldDrops() {
      for (const s of shieldDrops) {
        ctx.save();
        ctx.globalAlpha = s.life;
        ctx.translate(s.x, s.y);
        ctx.shadowColor = '#44aaff'; ctx.shadowBlur = 14;
        ctx.fillStyle = 'rgba(0,10,30,0.75)';
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#44aaff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#44aaff';
        ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🛡', 0, 1);
        ctx.restore();
      }
    }

    function drawShield() {
      players.forEach(p => {
        if (p.shields <= 0) return;
        p.shieldAnim++;
        const pulse = 0.5 + 0.5 * Math.sin(p.shieldAnim * 0.1);
        const intensity = p.shields / p.maxHp;
        ctx.save();
        ctx.globalAlpha = 0.25 + pulse * 0.2 + intensity * 0.15;
        ctx.strokeStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 14 + pulse * 8 + intensity * 10;
        ctx.lineWidth = 1.5 + intensity * 1.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 30 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.06 + pulse * 0.05 + intensity * 0.06;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 30 + pulse * 3, 0, Math.PI * 2);
        ctx.fill();
        // Shield count badge
        if (p.shields > 1) {
          ctx.globalAlpha = 0.9;
          ctx.shadowBlur = 6;
          ctx.font = 'bold 9px monospace';
          ctx.fillStyle = p.color;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('×' + p.shields, p.x + 26, p.y - 26);
        }
        ctx.restore();
      });
    }

    // ─── BOSS RANDOM GUN DROP ─────────────────────────────────────
    function onBossHit(e) {
      // 3% chance to drop a gun when a boss is hit (only if no active gun)
      if (players.some(p => p.gunTimer === 0) && Math.random() < 0.03) {
        const bl = Math.max((players[0].baseGunLevel || 1), (players[1].baseGunLevel || 1));
        let level = Math.floor(Math.random() * 4) + 2;
        if (level <= bl) level = bl + 1;
        gunDrops.push({ x: e.x + (Math.random() - 0.5) * 40, y: e.y, vy: 1.2, level, life: 1.0 });
      }
      // 3% chance to drop a heart when a boss is hit
      if (Math.random() < 0.03) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 1.2 + Math.random() * 1.0;
        heartPacks.push({ x: e.x, y: e.y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, r: 12, bob: Math.random() * Math.PI * 2, life: 1.0 });
      }
    }

    function drawPlayer() {
      players.forEach((p, i) => {
        if (p.dead && p.deathAnim >= 115) return;
        if (!p.dead && p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 1) return;

        const bank = p.bankAngle || 0; // radians, positive = right tilt
        const throb = Math.sin(p.thrustAnim * 0.3);

        // ── Engine flames (drawn BEFORE body so they appear behind) ──
        // When banking, outer engine burns brighter, inner dims
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(bank);

        const leftBias  = Math.max(0, -bank * 3.5); // extra flame when banking left
        const rightBias = Math.max(0,  bank * 3.5); // extra flame when banking right

        // Left engine
        const lfSz = 8 + throb * 3 + leftBias * 6;
        const lfg = ctx.createRadialGradient(-7, p.h / 2, 0, -7, p.h / 2, lfSz * 2);
        lfg.addColorStop(0, 'rgba(120,210,255,1)');
        lfg.addColorStop(0.35, `rgba(0,140,255,${0.8 - rightBias * 0.4})`);
        lfg.addColorStop(1, 'rgba(0,60,255,0)');
        ctx.fillStyle = lfg;
        ctx.beginPath();
        ctx.ellipse(-7, p.h / 2 + lfSz * 0.4, lfSz * 0.45, lfSz, 0, 0, Math.PI * 2);
        ctx.fill();

        // Right engine
        const rfSz = 8 + throb * 3 + rightBias * 6;
        const rfg = ctx.createRadialGradient(7, p.h / 2, 0, 7, p.h / 2, rfSz * 2);
        rfg.addColorStop(0, 'rgba(120,210,255,1)');
        rfg.addColorStop(0.35, `rgba(0,140,255,${0.8 - leftBias * 0.4})`);
        rfg.addColorStop(1, 'rgba(0,60,255,0)');
        ctx.fillStyle = rfg;
        ctx.beginPath();
        ctx.ellipse(7, p.h / 2 + rfSz * 0.4, rfSz * 0.45, rfSz, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // ── Main jet body (with banking rotation) ──
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(bank);

        ctx.shadowColor = p.color;
        ctx.shadowBlur = 16 + Math.abs(bank) * 20; // glow intensifies while banking

        // Main fuselage
        ctx.fillStyle = '#c0c8d8';
        ctx.beginPath();
        ctx.moveTo(0, -p.h / 2);
        ctx.lineTo(8, -p.h / 4);
        ctx.lineTo(10, p.h / 4);
        ctx.lineTo(0, p.h / 2);
        ctx.lineTo(-10, p.h / 4);
        ctx.lineTo(-8, -p.h / 4);
        ctx.closePath();
        ctx.fill();

        // Wings — perspective foreshortening based on bank angle
        // Inner wing (side we're banking toward) appears narrower
        // Outer wing appears wider/lifted
        const leftWingX  = -(p.w / 2) * (1 + bank * 0.55);  // widens when banking right
        const rightWingX =  (p.w / 2) * (1 - bank * 0.55);  // widens when banking left
        const leftWingY  = p.h / 4 + bank * 4;               // trailing edge dips
        const rightWingY = p.h / 4 - bank * 4;

        ctx.fillStyle = i === 1 ? '#dd8090' : '#8090a8';
        // Left wing
        ctx.beginPath();
        ctx.moveTo(-8, 0);
        ctx.lineTo(leftWingX, leftWingY);
        ctx.lineTo(leftWingX + 4, p.h / 2 - 6);
        ctx.lineTo(-6, p.h / 4 - 4);
        ctx.closePath();
        ctx.fill();
        // Right wing
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.lineTo(rightWingX, rightWingY);
        ctx.lineTo(rightWingX - 4, p.h / 2 - 6);
        ctx.lineTo(6, p.h / 4 - 4);
        ctx.closePath();
        ctx.fill();

        // Wing tip accent lights
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(leftWingX  + 5, leftWingY  - 3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(rightWingX - 5, rightWingY - 3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '7px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('★', leftWingX  + 5, leftWingY  - 3);
        ctx.fillText('★', rightWingX - 5, rightWingY - 3);

        // Cockpit — shifts slightly in direction of bank for lean feel
        const cg = ctx.createLinearGradient(-4, -p.h / 2 + 4, 4, -p.h / 2 + 18);
        cg.addColorStop(0, '#88ccff');
        cg.addColorStop(1, '#2255aa');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.ellipse(bank * 5, -p.h / 2 + 12, 5, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Canopy glint highlight
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.ellipse(bank * 5 - 1.5, -p.h / 2 + 9, 2, 3.5, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // Raging fire effect when dead
        if (p.dead) {
          ctx.shadowBlur = 0;
          ctx.globalCompositeOperation = 'lighter';
          for (let j = 0; j < 10; j++) {
            const fx = (Math.random() - 0.5) * p.w * 0.7;
            const fy = (Math.random() - 0.5) * p.h * 0.9;
            const r = Math.random() * 12 + 4;
            const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
            g.addColorStop(0, 'rgba(255, 200, 50, 1)');
            g.addColorStop(0.3, 'rgba(255, 80, 0, 0.8)');
            g.addColorStop(1, 'rgba(200, 0, 0, 0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(fx, fy, r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalCompositeOperation = 'source-over';

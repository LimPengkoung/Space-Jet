        }

        ctx.shadowBlur = 0;
        ctx.restore();
      });
    }

    // ─── ENEMIES ───────────────────────────────────────────────────
    const enemies = [];

    function spawnEnemy(type, x, y, pattern) {
      const e = {
        type, x, y, pattern, phase: 0, timer: 0, shootTimer: 0, dead: false,
        burstCount: 0, burstMax: 0, burstCooldown: 0
      };
      // ── Regular enemies ──
      if (type === 'small') { e.hp = 1; e.maxHp = 1; e.w = 28; e.h = 28; e.speed = 2.6 + wave * 0.12; e.score = 100; e.shootInterval = 14; e.burstMax = 2; e.burstCooldown = 140; }
      if (type === 'medium') { e.hp = 3; e.maxHp = 3; e.w = 36; e.h = 36; e.speed = 2.0 + wave * 0.09; e.score = 250; e.shootInterval = 14; e.burstMax = 3; e.burstCooldown = 130; }
      if (type === 'speeder') { e.hp = 2; e.maxHp = 2; e.w = 24; e.h = 30; e.speed = 7.5 + wave * 0.22; e.score = 180; e.shootInterval = 14; e.burstMax = 3; e.burstCooldown = 150; }
      if (type === 'tank')   { e.hp = 8;  e.maxHp = 8;  e.w = 44; e.h = 44; e.speed = 1.5 + wave * 0.08; e.score = 400;  e.shootInterval = 16; e.burstMax = 4;  e.burstCooldown = 130; }
      if (type === 'sniper')  { e.hp = 2;  e.maxHp = 2;  e.w = 28; e.h = 38; e.speed = 1.5 + wave * 0.08; e.score = 300;  e.shootInterval = 12; e.burstMax = 2;  e.burstCooldown = 160; }
      // ── Boss enemies ──
      if (type === 'boss')  { e.hp = 40 + wave * 20; e.maxHp = 40 + wave * 20; e.w = 90;  e.h = 70; e.speed = 2.6; e.score = 2000; e.shootInterval = 14; e.burstMax = 6;  e.burstCooldown = 75; }
      if (type === 'boss2') { e.hp = 60 + wave * 25; e.maxHp = 60 + wave * 25; e.w = 100; e.h = 80; e.speed = 3.2; e.score = 3000; e.shootInterval = 10; e.burstMax = 8;  e.burstCooldown = 65; }
      if (type === 'boss3') { e.hp = 80 + wave * 30; e.maxHp = 80 + wave * 30; e.w = 110; e.h = 90; e.speed = 3.8; e.speed2 = 5.5; e.score = 5000; e.shootInterval = 8; e.burstMax = 10; e.burstCooldown = 55; }

      // ── CO-OP DIFFICULTY MULTIPLIER ──────────────────────────────────
      // 2-player scaling: tankier enemies, slightly faster, but NOT bullet-hell density.
      // The two players together already have 2x firepower, so enemies need more HP
      // but should NOT spam bullets — that just makes the game unfair, not challenging.
      if (coopMode) {
        e.hp     = Math.ceil(e.hp * 1.3);    // +30% HP (down from 60%)
        e.maxHp  = e.hp;
        e.speed  *= 1.1;                      // +10% speed (down from 20%)
        e.speed2 = e.speed2 ? e.speed2 * 1.1 : undefined;
        e.shootInterval = Math.max(8, Math.floor(e.shootInterval * 0.9));  // 10% faster (was 25%)
        e.burstMax      = e.burstMax + 1;     // +1 bullet per burst (was +2)
        e.burstCooldown = Math.max(50, Math.floor(e.burstCooldown * 0.88)); // 12% shorter (was 25%)
        e.score  = Math.floor(e.score * 1.5); // +50% score reward (unchanged)
      }

      enemies.push(e);
    }

    function spawnWave() {
      const bossWave = wave % 5 === 0;
      // In co-op: more enemies, higher cap, boss gets elite escorts
      const coopBonus = coopMode ? 1 : 0;
      const MAX_ENEMIES = coopMode ? 40 : 25;

      if (bossWave) {
        const bossType = wave % 15 === 0 ? 'boss3' : (wave % 10 === 0 ? 'boss2' : 'boss');
        spawnEnemy(bossType, W / 2, -100, 'boss');

        if (coopMode) {
          // Boss arrives with elite tank escorts in co-op!
          const escortCount = 2 + Math.floor(wave / 5);
          for (let i = 0; i < Math.min(escortCount, 6); i++) {
            const ex = 60 + i * 70 + Math.random() * 30;
            spawnEnemy(i % 2 === 0 ? 'tank' : 'speeder', ex, -180 - i * 40,
              i % 2 === 0 ? 'hover' : 'straight');
          }
          showWaveAnnounce('⚠ BOSS WAVE ' + wave + ' ⚠\n⚡ ELITE MODE ⚡');
        } else {
          showWaveAnnounce('⚠ BOSS WAVE ' + wave + ' ⚠');
        }
      } else {
        showWaveAnnounce(coopMode ? 'CO-OP WAVE ' + wave : 'WAVE ' + wave);
        let spawned = 0;

        // Small — scales up to 10 (+4 in co-op)
        const smallCount = Math.min(4 + wave * 2 + coopBonus * 4, 10 + coopBonus * 4);
        for (let i = 0; i < smallCount && spawned < MAX_ENEMIES; i++) {
          const x = 40 + (i % 6) * 65 + Math.random() * 20;
          const y = -60 - Math.floor(i / 6) * 50;
          spawnEnemy('small', x, y, i % 2 === 0 ? 'zigzag' : 'straight');
          spawned++;
        }
        // Medium from wave 2 — scales up to 5 (+3 in co-op)
        if (wave >= 2) {
          const medCount = Math.min(1 + wave + coopBonus * 2, 5 + coopBonus * 3);
          for (let i = 0; i < medCount && spawned < MAX_ENEMIES; i++) {
            spawnEnemy('medium', 80 + i * 90 + Math.random() * 30, -140 - i * 45, 'hover');
            spawned++;
          }
        }
        // Speeder from wave 3 — scales up to 4 (+3 in co-op)
        if (wave >= 3) {
          const spdCount = Math.min(wave - 1 + coopBonus * 2, 4 + coopBonus * 3);
          for (let i = 0; i < spdCount && spawned < MAX_ENEMIES; i++) {
            spawnEnemy('speeder', 50 + i * 120 + Math.random() * 30, -60 - i * 30, 'straight');
            spawned++;
          }
        }
        // Tank from wave 4 — scales up to 3 (+2 in co-op)
        if (wave >= 4) {
          const tankCount = Math.min(wave - 2 + coopBonus, 3 + coopBonus * 2);
          for (let i = 0; i < tankCount && spawned < MAX_ENEMIES; i++) {
            spawnEnemy('tank', 100 + i * 150 + Math.random() * 20, -120 - i * 40, 'hover');
            spawned++;
          }
        }
        // Sniper from wave 5 — scales up to 3 (+2 in co-op)
        if (wave >= 5) {
          const snpCount = Math.min(wave - 3 + coopBonus, 3 + coopBonus * 2);
          for (let i = 0; i < snpCount && spawned < MAX_ENEMIES; i++) {
            spawnEnemy('sniper', 70 + i * 160 + Math.random() * 30, -100 - i * 50, 'snipe');
            spawned++;
          }
        }
      }
    }

    const ENEMY_COLORS = {
      small: { body: '#8b8420', wing: '#6b6410', cockpit: '#40c040' },
      medium: { body: '#6b7820', wing: '#4b5810', cockpit: '#80c840' },
      speeder: { body: '#882020', wing: '#661010', cockpit: '#ff6040' },
      tank: { body: '#404880', wing: '#282c60', cockpit: '#60a0ff' },
      sniper: { body: '#606020', wing: '#404010', cockpit: '#ffee40' },
      boss: { body: '#5a6820', wing: '#3a4810', cockpit: '#c0d040' },
      boss2: { body: '#803020', wing: '#601010', cockpit: '#ff8040' },
      boss3: { body: '#502060', wing: '#380040', cockpit: '#cc44ff' },
    };

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);
      const c = ENEMY_COLORS[e.type] || ENEMY_COLORS.small;
      const isBoss = e.type.startsWith('boss');
      const s = e.type === 'boss3' ? 1.2 : (e.type === 'boss2' ? 1.1 : (isBoss ? 1 : (e.type === 'tank' ? 1 : (e.type === 'medium' ? 0.9 : 0.7))));
      ctx.scale(s, s);

      const flashHit = e.hitFlash > 0;
      if (flashHit) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 20; }

      const hw = isBoss ? (e.type === 'boss3' ? 80 : e.type === 'boss2' ? 74 : 70) : (e.type === 'tank' ? 46 : e.type === 'medium' ? 42 : 34);
      const hh = isBoss ? (e.type === 'boss3' ? 70 : e.type === 'boss2' ? 60 : 50) : (e.type === 'tank' ? 44 : e.type === 'medium' ? 38 : 28);

      // ── Speeder: sleek narrow shape ──
      if (e.type === 'speeder') {
        ctx.fillStyle = flashHit ? '#fff' : c.wing;
        ctx.beginPath(); ctx.moveTo(-18, 8); ctx.lineTo(-28, 22); ctx.lineTo(-14, 18); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(18, 8); ctx.lineTo(28, 22); ctx.lineTo(14, 18); ctx.closePath(); ctx.fill();
        ctx.fillStyle = flashHit ? '#fff' : c.body;
        ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(6, -4); ctx.lineTo(6, 14); ctx.lineTo(0, 18); ctx.lineTo(-6, 14); ctx.lineTo(-6, -4); ctx.closePath(); ctx.fill();
        ctx.fillStyle = flashHit ? '#fff' : c.cockpit;
        ctx.beginPath(); ctx.ellipse(0, -10, 3, 7, 0, 0, Math.PI * 2); ctx.fill();

        // ── Tank: wide armored shape ──
      } else if (e.type === 'tank') {

        ctx.fillStyle = flashHit ? '#fff' : c.body;
        ctx.beginPath(); ctx.moveTo(0, -hh / 2); ctx.lineTo(14, -hh / 4); ctx.lineTo(16, hh / 4); ctx.lineTo(0, hh / 2); ctx.lineTo(-16, hh / 4); ctx.lineTo(-14, -hh / 4); ctx.closePath(); ctx.fill();
        // Armor plates
        ctx.fillStyle = flashHit ? '#fff' : '#303868';
        ctx.fillRect(-10, -hh / 2 + 4, 20, 10);
        ctx.fillRect(-12, 0, 24, 8);
        ctx.fillStyle = flashHit ? '#fff' : c.cockpit;
        ctx.beginPath(); ctx.ellipse(0, -hh / 2 + 12, 5, 7, 0, 0, Math.PI * 2); ctx.fill();

        // ── Sniper: long narrow fuselage ──
      } else if (e.type === 'sniper') {
        ctx.fillStyle = flashHit ? '#fff' : c.wing;
        ctx.beginPath(); ctx.moveTo(-8, 2); ctx.lineTo(-22, 12); ctx.lineTo(-16, hh / 2 - 4); ctx.lineTo(-6, 8); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(8, 2); ctx.lineTo(22, 12); ctx.lineTo(16, hh / 2 - 4); ctx.lineTo(6, 8); ctx.closePath(); ctx.fill();
        ctx.fillStyle = flashHit ? '#fff' : c.body;
        ctx.beginPath(); ctx.moveTo(0, -hh / 2); ctx.lineTo(5, -hh / 3); ctx.lineTo(7, hh / 4); ctx.lineTo(0, hh / 2); ctx.lineTo(-7, hh / 4); ctx.lineTo(-5, -hh / 3); ctx.closePath(); ctx.fill();
        // Sniper barrel
        ctx.fillStyle = flashHit ? '#fff' : '#303010';
        ctx.fillRect(-2, -hh / 2 - 10, 4, 12);
        ctx.fillStyle = flashHit ? '#fff' : c.cockpit;
        ctx.beginPath(); ctx.ellipse(0, -hh / 2 + 10, 4, 6, 0, 0, Math.PI * 2); ctx.fill();

        // ── Boss2: wider aggressive shape ──
      } else if (e.type === 'boss2') {
        ctx.fillStyle = flashHit ? '#fff' : c.wing;
        ctx.beginPath(); ctx.moveTo(-hw / 2, -10); ctx.lineTo(-hw / 2 - 16, 32); ctx.lineTo(-hw / 2 + 6, hh / 2 + 10); ctx.lineTo(-10, 10); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(hw / 2, -10); ctx.lineTo(hw / 2 + 16, 32); ctx.lineTo(hw / 2 - 6, hh / 2 + 10); ctx.lineTo(10, 10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = flashHit ? '#fff' : c.body;
        ctx.beginPath(); ctx.moveTo(0, -hh / 2); ctx.lineTo(14, -hh / 4); ctx.lineTo(16, hh / 4); ctx.lineTo(0, hh / 2); ctx.lineTo(-16, hh / 4); ctx.lineTo(-14, -hh / 4); ctx.closePath(); ctx.fill();

        ctx.fillStyle = flashHit ? '#fff' : '#111';
        ctx.beginPath(); ctx.moveTo(-42, 12); ctx.lineTo(-50, 40); ctx.lineTo(-24, 30); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(42, 12); ctx.lineTo(50, 40); ctx.lineTo(24, 30); ctx.closePath(); ctx.fill();

        // Menacing double glowing eyes
        if (!flashHit) { ctx.shadowColor = '#ff2020'; ctx.shadowBlur = 15; }
        ctx.fillStyle = flashHit ? '#fff' : '#ff1010';
        ctx.beginPath(); ctx.ellipse(-6, -hh / 2 + 12, 4, 8, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(6, -hh / 2 + 12, 4, 8, 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        // Huge forward spikes
        ctx.fillStyle = flashHit ? '#fff' : '#200505';
        ctx.beginPath(); ctx.moveTo(-8, -hh / 2); ctx.lineTo(-4, -hh / 2 - 20); ctx.lineTo(-2, -hh / 2); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(8, -hh / 2); ctx.lineTo(4, -hh / 2 - 20); ctx.lineTo(2, -hh / 2); ctx.closePath(); ctx.fill();

        // ── Boss3: massive purple dreadnought ──
      } else if (e.type === 'boss3') {
        ctx.fillStyle = flashHit ? '#fff' : c.wing;
        ctx.beginPath(); ctx.moveTo(-hw / 2, 0); ctx.lineTo(-hw / 2 - 26, 40); ctx.lineTo(-hw / 2 + 16, hh / 2 + 10); ctx.lineTo(-16, 18); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(hw / 2, 0); ctx.lineTo(hw / 2 + 26, 40); ctx.lineTo(hw / 2 - 16, hh / 2 + 10); ctx.lineTo(16, 18); ctx.closePath(); ctx.fill();

        ctx.fillStyle = flashHit ? '#fff' : '#220033';
        ctx.beginPath(); ctx.moveTo(-hw / 2 + 6, 20); ctx.lineTo(-hw / 2 - 4, 55); ctx.lineTo(-20, 36); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(hw / 2 - 6, 20); ctx.lineTo(hw / 2 + 4, 55); ctx.lineTo(20, 36); ctx.closePath(); ctx.fill();

        ctx.fillStyle = flashHit ? '#fff' : c.body;
        ctx.beginPath(); ctx.moveTo(0, -hh / 2 - 10); ctx.lineTo(24, -hh / 4); ctx.lineTo(20, hh / 4 + 10); ctx.lineTo(0, hh / 2 + 8); ctx.lineTo(-20, hh / 4 + 10); ctx.lineTo(-24, -hh / 4); ctx.closePath(); ctx.fill();

        // Huge dark turrets emitting red energy
        ctx.fillStyle = flashHit ? '#fff' : '#111';
        ctx.beginPath(); ctx.rect(-50, 10, 16, 36); ctx.fill();
        ctx.beginPath(); ctx.rect(34, 10, 16, 36); ctx.fill();
        ctx.fillRect(-24, -20, 14, 28);
        ctx.fillRect(10, -20, 14, 28);

        // Menacing Hellfire Energy core
        if (!flashHit) { ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 30; }
        ctx.fillStyle = flashHit ? '#fff' : '#ff0000';
        ctx.beginPath(); ctx.arc(0, 4, 12 + Math.random() * 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = flashHit ? '#fff' : '#ffcc00';
        ctx.beginPath(); ctx.arc(0, 4, 6 + Math.random() * 2, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        // Demonic V-eye slit layout instead of a cockpit
        if (!flashHit) { ctx.shadowColor = '#ff0033'; ctx.shadowBlur = 15; }
        ctx.fillStyle = flashHit ? '#fff' : '#ff0033';
        ctx.beginPath(); ctx.moveTo(-16, -hh / 2 + 10); ctx.lineTo(16, -hh / 2 + 10); ctx.lineTo(0, -hh / 2 + 20); ctx.closePath(); ctx.fill();
        ctx.shadowBlur = 0;

        // ── Default (small, medium, boss) ──
      } else {
        ctx.fillStyle = flashHit ? '#fff' : c.wing;
        ctx.beginPath(); ctx.moveTo(-hw / 2, 10); ctx.lineTo(-hw / 2 - 8, 26); ctx.lineTo(-hw / 2 + 4, hh / 2); ctx.lineTo(-8, 10); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(hw / 2, 10); ctx.lineTo(hw / 2 + 8, 26); ctx.lineTo(hw / 2 - 4, hh / 2); ctx.lineTo(8, 10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = flashHit ? '#fff' : c.body;
        ctx.beginPath(); ctx.moveTo(0, -hh / 2); ctx.lineTo(10, -hh / 4); ctx.lineTo(12, hh / 4); ctx.lineTo(0, hh / 2); ctx.lineTo(-12, hh / 4); ctx.lineTo(-10, -hh / 4); ctx.closePath(); ctx.fill();

        if (e.type === 'boss') {
          if (!flashHit) { ctx.shadowColor = '#ff0033'; ctx.shadowBlur = 15; }
          ctx.fillStyle = flashHit ? '#fff' : '#ff0033';
          ctx.beginPath(); ctx.moveTo(-12, -hh / 2 + 8); ctx.lineTo(12, -hh / 2 + 8); ctx.lineTo(8, -hh / 2 + 12); ctx.lineTo(-8, -hh / 2 + 12); ctx.closePath(); ctx.fill();
          ctx.shadowBlur = 0;

          ctx.fillStyle = flashHit ? '#fff' : '#111';
          ctx.beginPath(); ctx.moveTo(-36, 16); ctx.lineTo(-46, 36); ctx.lineTo(-22, 26); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(36, 16); ctx.lineTo(46, 36); ctx.lineTo(22, 26); ctx.closePath(); ctx.fill();
        } else {
          ctx.fillStyle = flashHit ? '#fff' : c.cockpit;
          ctx.beginPath(); ctx.ellipse(0, -hh / 2 + 10, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Boss HP bar above sprite
      if (isBoss) {
        const barW = 90, barH = 7;
        const pct = Math.max(0, e.hp / e.maxHp);
        const color = `hsl(${pct * 120},100%,50%)`;
        drawPremiumBar(-barW / 2, -hh / 2 - 18, barW, barH, pct, color);
      }

      ctx.shadowBlur = 0;
      ctx.restore();

      // Small HP bars for tank/medium when damaged
      if ((e.type === 'tank' || e.type === 'medium') && e.hp < e.maxHp) {
        const bw = 38;
        const pct = Math.max(0, e.hp / e.maxHp);
        drawPremiumBar(e.x - bw / 2, e.y - e.h / 2 - 12, bw, 6, pct, '#40ff40');
      }
    }

    function updateEnemies() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.dead) {
          e.deathAnim = (e.deathAnim || 0) + 1;
          if (e.deathAnim % 6 === 0 && e.deathAnim < 80) {
            spawnExplosion(e.x + (Math.random() - 0.5) * e.w, e.y + (Math.random() - 0.5) * e.h, Math.random() * 20 + 20, false);
            if (Math.random() < 0.5) playSfx('enemyHit');
          }
          if (e.deathAnim === 90) {
            spawnExplosion(e.x, e.y, e.w * 0.8 + 20, true);
            spawnExplosion(e.x - 30, e.y + e.h / 2, e.w * 0.5 + 10, true);
            spawnExplosion(e.x + 30, e.y - e.h / 2, e.w * 0.6 + 10, true);
            playSfx('enemyDie');
            if (e.type.startsWith('boss')) {
              setMapTheme(currentMapTheme + 1);
            }
          }
          if (e.deathAnim > 95) {
            enemies.splice(i, 1);
          }
          continue;
        }
        e.timer++;
        if (e.hitFlash > 0) e.hitFlash--;

        // Movement patterns
        if (e.type === 'small') {
          // Glide down to upper half then drift side to side like other shooters
          if (e.y < 160) { e.y += e.speed; }
          else { e.x += Math.sin(e.timer * 0.05) * 2; }
          e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
          e.y = Math.max(40, Math.min(240, e.y));
        } else if (e.type === 'medium') {
          if (e.y < 120) { e.y += e.speed; }
          else { e.x += Math.sin(e.timer * 0.03) * 1.2; }
          e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
          e.y = Math.max(60, Math.min(200, e.y));
        } else if (e.type === 'speeder') {
          if (e.y < 200) { e.y += e.speed; e.x += Math.sin(e.timer * 0.08) * 1.5; }
          else { e.x += Math.sin(e.timer * 0.06) * 3; }
          e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
          e.y = Math.max(40, Math.min(260, e.y));
        } else if (e.type === 'tank') {
          if (e.y < 160) { e.y += e.speed; }
          else { e.x += Math.sin(e.timer * 0.02) * 0.8; }
          e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
          e.y = Math.max(60, Math.min(220, e.y));
        } else if (e.type === 'sniper') {
          if (e.y < 100) { e.y += e.speed; }
          else { e.x += Math.sin(e.timer * 0.015) * 0.8; }
          e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
          e.y = Math.max(40, Math.min(160, e.y));
        } else if (e.type === 'boss') {
          if (e.y < 120) { e.y += e.speed; }
          else {
            const p = Math.floor(e.timer / 180) % 3;
            if (p === 0) e.x += Math.sin(e.timer * 0.025) * 2;
            else if (p === 1) { e.x += Math.sin(e.timer * 0.04) * 2.5; e.y += Math.sin(e.timer * 0.02) * 0.8; }
            else { e.x = W / 2 + Math.cos(e.timer * 0.03) * 140; }
            e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
            e.y = Math.max(80, Math.min(250, e.y));
            document.getElementById('bossHpFill').style.width = (e.hp / e.maxHp * 100) + '%';
          }
        } else if (e.type === 'boss2') {
          if (e.y < 130) { e.y += e.speed; }
          else {
            // Figure-8 pattern
            e.x = W / 2 + Math.cos(e.timer * 0.02) * 160;
            e.y = 140 + Math.sin(e.timer * 0.04) * 60;
            e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
            document.getElementById('bossHpFill').style.width = (e.hp / e.maxHp * 100) + '%';
          }
        } else if (e.type === 'boss3') {
          if (e.y < 150) { e.y += e.speed; }
          else {
            // Aggressive charge phases
            const p = Math.floor(e.timer / 150) % 4;
            if (p === 0) { e.x += Math.sin(e.timer * 0.03) * 3; }
            else if (p === 1) { e.x = W / 2 + Math.cos(e.timer * 0.05) * 180; e.y = 150 + Math.sin(e.timer * 0.03) * 80; }
            else if (p === 2) { // Charge at nearest player
              let tp = players.filter(p=>!p.dead).sort((a,b) => Math.hypot(a.x-e.x, a.y-e.y) - Math.hypot(b.x-e.x, b.y-e.y))[0] || players[0];
              const dx = tp.x - e.x, dy = tp.y - e.y;
              const d = Math.sqrt(dx * dx + dy * dy);
              e.x += (dx / d) * e.speed2 * 0.6; e.y += (dy / d) * e.speed2 * 0.3;
            } else { e.x += Math.sin(e.timer * 0.06) * 4; }
            e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
            e.y = Math.max(80, Math.min(300, e.y));
            document.getElementById('bossHpFill').style.width = (e.hp / e.maxHp * 100) + '%';
          }
        }

        // Remove if off-screen (small only — others handled above)
        if (e.type === 'small' && e.y > H + 40) { enemies.splice(i, 1); continue; }

        // Enemy shooting — burst then long pause
        e.shootTimer++;
        if (e.burstCount > 0) {
          // Mid-burst: fire at shootInterval pace
          if (e.shootTimer >= e.shootInterval) {
            e.shootTimer = 0;
            e.burstCount--;
            shootEnemy(e);
          }
        } else {
          // Waiting for next burst
          if (e.shootTimer >= e.burstCooldown) {
            e.shootTimer = 0;
            e.burstCount = e.burstMax;
            e.laserBurst = (e.type.startsWith('boss') && Math.random() < 0.45);
          }
        }
      }
    }

    function shootEnemy(e) {
      let target = players.filter(p=>!p.dead).sort((a,b) => Math.hypot(a.x-e.x, a.y-e.y) - Math.hypot(b.x-e.x, b.y-e.y))[0] || players[0];
      const dx = target.x - e.x, dy = target.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const nx = dx / dist, ny = dy / dist;

      if (e.laserBurst) {
        spawnEnemyLaser(e.x, e.y, target.x, target.y);
        e.burstCount = 0;
        return;
      }

      playSfx('enemyShoot');

      if (e.type === 'small') {
        spawnEnemyBullet(e.x, e.y, nx * 4.0, ny * 4.0, 'normal');

      } else if (e.type === 'medium') {
        spawnEnemyBullet(e.x, e.y, nx * 4.0 - 0.8, ny * 4.0, 'normal');
        spawnEnemyBullet(e.x, e.y, nx * 4.0 + 0.8, ny * 4.0, 'normal');

      } else if (e.type === 'speeder') {
        spawnEnemyBullet(e.x, e.y, nx * 5.5, ny * 5.5, 'normal');

      } else if (e.type === 'tank') {
        for (let a = -1; a <= 1; a++) {
          const ang = Math.atan2(ny, nx) + a * 0.28;
          spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 4.0, Math.sin(ang) * 4.0, 'big');
        }

      } else if (e.type === 'sniper') {
        spawnEnemyBullet(e.x, e.y, nx * 9.0, ny * 9.0, 'normal');

      } else if (e.type === 'boss') {
        const p = Math.floor(e.timer / 180) % 3;
        if (p === 0) {
          for (let a = -2; a <= 2; a++) { // 5-way spread
            const ang = Math.atan2(ny, nx) + a * 0.2;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 4.5, Math.sin(ang) * 4.5, 'normal');
          }
        } else if (p === 1) {
          for (let a = 0; a < 6; a++) { // 6-way burst
            const ang = (a / 6) * Math.PI * 2 + e.timer * 0.04;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 4.0, Math.sin(ang) * 4.0, 'normal');
          }
        } else {
          spawnEnemyBullet(e.x, e.y, nx * 6.5, ny * 6.5, 'big');
        }

      } else if (e.type === 'boss2') {
        const p = Math.floor(e.timer / 150) % 3;
        if (p === 0) {
          for (let a = 0; a < 6; a++) { // 6-way fast spin
            const ang = (a / 6) * Math.PI * 2 + e.timer * 0.035;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 5.0, Math.sin(ang) * 5.0, 'normal');
          }
        } else if (p === 1) {
          for (let a = -2; a <= 2; a += 2) { // 3 heavy lasers intersecting
            const ang = Math.atan2(ny, nx) + a * 0.15;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 6.5, Math.sin(ang) * 6.5, 'normal');
          }
        } else {
          for (let a = -2; a <= 2; a++) { // 5 big bullets instead of 3
            const ang = Math.atan2(ny, nx) + a * 0.20;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 4.5, Math.sin(ang) * 4.5, 'big');
          }
        }

      } else if (e.type === 'boss3') {
        const p = Math.floor(e.timer / 120) % 4;
        if (p === 0) {
          for (let a = 0; a < 10; a++) { // 10-way massive spiral
            const ang = (a / 10) * Math.PI * 2 + e.timer * 0.03;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 5.5, Math.sin(ang) * 5.5, 'normal');
          }
        } else if (p === 1) {
          const offsets = [[-46, 22], [30, 22], [-22, 4], [10, 4]];
          for (const [ox, oy] of offsets) {
            spawnEnemyBullet(e.x + ox, e.y + oy, nx * 6.5, ny * 6.5, 'big');
          }
        } else if (p === 2) {
          for (let a = 0; a < 6; a++) { // Double the spin rays
            const ang = (a / 6) * Math.PI * 2 + e.timer * 0.05;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 6.0, Math.sin(ang) * 6.0, 'normal');
            spawnEnemyBullet(e.x, e.y, Math.cos(ang + Math.PI) * 6.0, Math.sin(ang + Math.PI) * 6.0, 'normal');
          }
        } else {
          for (let a = -3; a <= 3; a++) { // 7-way thick shotgun
            const ang = Math.atan2(ny, nx) + a * 0.18;
            spawnEnemyBullet(e.x, e.y, Math.cos(ang) * 5.0, Math.sin(ang) * 5.0, a === 0 ? 'big' : 'normal');
          }
        }
      }
    }

    // ─── COLLISION ─────────────────────────────────────────────────
    function collide() {
      // Player Continuous Laser (Level 4) vs enemies
      players.forEach(p => {
        p.laserTargetY = 0;
        if (p.gunLevel === 4 && !p.dead) {
          let closestHitY = 0;
          let hitEnemy = null;
          for (const e of enemies) {
            if (e.dead) continue;
            if (e.y < p.y && Math.abs(e.x - p.x) < e.w / 2 + 10) {
              const hitY = e.y + e.h / 2;
              if (hitY > closestHitY) {
                closestHitY = hitY;
                hitEnemy = e;
              }
            }
          }
          p.laserTargetY = closestHitY;
          if (hitEnemy) {
            hitEnemy.hp -= 0.6;
            hitEnemy.hitFlash = 2;
            if (Math.random() < 0.3) spawnHitEffect(p.x + (Math.random() * 8 - 4), closestHitY);
            if (hitEnemy.type.startsWith('boss') && hitEnemy.hp > 0 && Math.random() < 0.04) onBossHit(hitEnemy);
          }
        }
      });

      // Player bullets vs enemies
      for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
        const b = playerBullets[bi];
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (e.dead) continue;
          if (Math.abs(b.x - e.x) < e.w / 2 && Math.abs(b.y - e.y) < e.h / 2) {
            playerBullets.splice(bi, 1);
            if (b.type === 'rocket') {
              spawnExplosion(b.x, b.y, 60, false);
              playSfx('enemyDie');
              for (const oe of enemies) {
                if (Math.abs(oe.x - b.x) < 80 && Math.abs(oe.y - b.y) < 80) {
                  oe.hp -= 5.0;
                  oe.hitFlash = 6;
                  oe._lastHitOwner = b.owner; // tag for score attribution
                  if (oe.type.startsWith('boss') && oe.hp > 0) onBossHit(oe);
                }
              }
            } else if (b.type === 'homing_rocket') {
              spawnExplosion(b.x, b.y, 30, false);
              playSfx('enemyDie');
              for (const oe of enemies) {
                if (Math.abs(oe.x - b.x) < 40 && Math.abs(oe.y - b.y) < 40) {
                  oe.hp -= 2.0;
                  oe.hitFlash = 6;
                  oe._lastHitOwner = b.owner;
                  if (oe.type.startsWith('boss') && oe.hp > 0) onBossHit(oe);
                }
              }
            } else {
              e.hp--;
              e.hitFlash = 6;
              e._lastHitOwner = b.owner; // tag for score attribution
              spawnHitEffect(b.x, b.y);
              if (e.type.startsWith('boss') && e.hp > 0) onBossHit(e);
              playSfx('enemyHit');
            }
            break;
          }
        }
      }

      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        if (e.hp <= 0 && !e.dead) {
          // Credit score & kill to whoever last dealt damage (tracked via e._lastHitOwner)
          const ownerIdx = (e._lastHitOwner !== undefined) ? e._lastHitOwner : 0;
          const scorer = players[ownerIdx] || players[0];
          scorer.score += e.score;
          scorer.kills++;
          score += e.score; // shared total (used for solo display & network sync compat)
          kills++;
          updateScoreHUD();
          document.getElementById('killDisplay').textContent = kills;
          if (!tryDropGun(e.x, e.y)) {
            if (!tryDropHeartPack(e.x, e.y)) {
              if (!tryDropShield(e.x, e.y)) {
                tryDropInvinciblePack(e.x, e.y);
              }
            }
          }
          
          if (e.type.startsWith('boss')) {
            e.dead = true;
            e.deathAnim = 0;
            document.getElementById('bossHpBar').style.display = 'none';
            if (e.type === 'boss') {
              players.forEach(p => {
                if ((p.baseGunLevel || 1) < 2) {
                  p.baseGunLevel = 2; 
                  if (p.gunTimer === 0) {
                    p.gunLevel = 2;
                    p.shootInterval = GUNS[2].interval;
                  }
                }
              });
              showWaveAnnounce('TWIN SHOT\nPERMANENTLY UNLOCKED!');
              playSfx('gunPickup');
            } else if (e.type === 'boss2') {
              players.forEach(p => {
                if ((p.baseGunLevel || 1) < 3) {
                  p.baseGunLevel = 3; 
                  if (p.gunTimer === 0) {
                    p.gunLevel = 3;
                    p.shootInterval = GUNS[3].interval;
                  }
                }
              });
              showWaveAnnounce('SPREAD SHOT\nPERMANENTLY UNLOCKED!');
              playSfx('gunPickup');
            }
          } else {
            spawnExplosion(e.x, e.y, e.type === 'medium' ? 28 : 14, !e.type.startsWith('small'));
            playSfx('enemyDie');
            enemies.splice(ei, 1);
          }
        }
      }

      // Enemy bullets vs player
      for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
        const b = enemyBullets[bi];
        const pr = 16;
        const dmg = b.type === 'big' ? 2 : 1; // Red bullets deal 2 damage
        for (const p of players) {
          if (p.dead || p.invincible > 0) continue;
          if (Math.abs(b.x - p.x) < pr && Math.abs(b.y - p.y) < pr) {
            enemyBullets.splice(bi, 1);
            if (p.shields > 0) {
              p.shields = Math.max(0, p.shields - dmg);
              p.shield = p.shields > 0;
              p.invincible = 30;
              playSfx('shieldBreak');
              spawnExplosion(p.x, p.y, 8);
              updateHealthUI();
            } else {
              p.hp = Math.max(0, p.hp - dmg);
              p.invincible = 45;
              spawnExplosion(p.x, p.y, 10);
              updateHealthUI();
              playSfx('playerHit');
              if (p.hp <= 0 && !p.dead) {
                p.dead = true;
                p.deathAnim = 0;
              }
            }
            break;
          }
        }
      }

      // Enemy body vs player
      for (const e of enemies) {
        if (e.dead) continue;
        for (const p of players) {
          if (p.dead || p.invincible > 0) continue;
          if (Math.abs(e.x - p.x) < (e.w / 2 + 14) && Math.abs(e.y - p.y) < (e.h / 2 + 14)) {
            if (p.shields > 0) {
              p.shields--;
              p.shield = p.shields > 0;
              p.invincible = 30;
              playSfx('shieldBreak');
              spawnExplosion(p.x, p.y, 8);
              updateHealthUI();
            } else {
              p.hp--;
              p.invincible = 60;
              spawnExplosion(p.x, p.y, 10);
              updateHealthUI();
              if (p.hp <= 0 && !p.dead) {
                p.dead = true;
                p.deathAnim = 0;
              }
            }
          }
        }
      }
    }

    // ─── HUD ───────────────────────────────────────────────────────

    // ─── HEART PACKS ───────────────────────────────────────────────
    const heartPacks = [];

    function tryDropHeartPack(x, y) {
      if (Math.random() < 0.05) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 1.2 + Math.random() * 1.2;
        heartPacks.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          r: 12,
          bob: Math.random() * Math.PI * 2,
          life: 1.0,
        });
        return true;
      }
      return false;
    }

    function updateHeartPacks() {
      for (let i = heartPacks.length - 1; i >= 0; i--) {
        const h = heartPacks[i];
        h.bob += 0.06;
        h.x += h.vx;
        h.y += h.vy;
        h.life -= 0.000833; // fade over 1200 frames (~20s at 60fps)

        // Remove if fully faded
        if (h.life <= 0) { heartPacks.splice(i, 1); continue; }

        // Bounce off all walls
        if (h.x - h.r < 0) { h.x = h.r; h.vx = Math.abs(h.vx); }
        if (h.x + h.r > W) { h.x = W - h.r; h.vx = -Math.abs(h.vx); }
        if (h.y - h.r < 0) { h.y = h.r; h.vy = Math.abs(h.vy); }
        if (h.y + h.r > H) { h.y = H - h.r; h.vy = -Math.abs(h.vy); }

        // Collect
        players.forEach(p => {
          if (p.dead) return;
          if (Math.abs(h.x - p.x) < 22 && Math.abs(h.y - p.y) < 22) {
            if (p.hp < p.maxHp) {
              p.hp++;
              updateHealthUI();
            }
            playSfx('heartPickup');
            spawnHeartCollectEffect(h.x, h.y);
            heartPacks.splice(i, 1);
          }
        });
      }
    }

    function spawnHeartCollectEffect(x, y, fromNet = false) {
      if (isHost && isOnline && !fromNet) {
        netEvents.push({ t: 'hce', x, y });
      }
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 3 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - 1,
          r: Math.random() * 4 + 2,
          life: 1, decay: 0.05,
          color: '#ff4488',
          type: 'spark'
        });
      }
    }

    function drawHeartPacks() {
      for (const h of heartPacks) {
        const bobY = Math.sin(h.bob) * 3;
        ctx.save();
        ctx.globalAlpha = h.life;
        ctx.translate(h.x, h.y + bobY);

        // Glow ring
        ctx.shadowColor = '#ff4488';
        ctx.shadowBlur = 16;

        // Pill background
        ctx.fillStyle = 'rgba(30, 10, 20, 0.75)';
        ctx.beginPath();
        ctx.arc(0, 0, h.r, 0, Math.PI * 2);
        ctx.fill();

        // Border
        ctx.strokeStyle = '#ff4488';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, h.r, 0, Math.PI * 2);
        ctx.stroke();

        // Heart symbol
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff4488';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♥', 0, 1);

        ctx.restore();
      }
    }

    // ─── INVINCIBLE PACKS ─────────────────────────────────────────
    const invinciblePacks = [];
    const INVINCIBLE_DURATION = 180; // 3 seconds of invincibility

    function tryDropInvinciblePack(x, y) {
      if (Math.random() < 0.05) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 1.0 + Math.random() * 1.0;
        invinciblePacks.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          bob: Math.random() * Math.PI * 2,
          life: 1.0,
        });
        return true;
      }
      return false;
    }

    function updateInvinciblePacks() {
      for (let i = invinciblePacks.length - 1; i >= 0; i--) {
        const pk = invinciblePacks[i];
        pk.bob += 0.06;
        pk.x += pk.vx; pk.y += pk.vy;
        pk.life -= 0.000833; // fade over 1200 frames (~20s at 60fps)

        if (pk.life <= 0) { invinciblePacks.splice(i, 1); continue; }

        // Bounce off all walls
        if (pk.x - 12 < 0) { pk.x = 12; pk.vx = Math.abs(pk.vx); }
        if (pk.x + 12 > W) { pk.x = W - 12; pk.vx = -Math.abs(pk.vx); }
        if (pk.y - 12 < 0) { pk.y = 12; pk.vy = Math.abs(pk.vy); }
        if (pk.y + 12 > H) { pk.y = H - 12; pk.vy = -Math.abs(pk.vy); }
        // Collect
        players.forEach(p => {
          if (p.dead) return;
          if (Math.abs(pk.x - p.x) < 22 && Math.abs(pk.y - p.y) < 22) {
            p.invincible = INVINCIBLE_DURATION;
            playSfx('invinciblePickup');
            showWaveAnnounce('⚡ INVINCIBLE!');
            spawnInvincibleEffect(pk.x, pk.y);
            invinciblePacks.splice(i, 1);
          }
        });
      }
    }

    function spawnInvincibleEffect(x, y) {
      for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 4 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          r: Math.random() * 4 + 2,
          life: 1, decay: 0.04,
          color: '#ffee00',
          type: 'spark'
        });
      }
    }

    function drawInvinciblePacks() {
      for (const p of invinciblePacks) {
        const bobY = Math.sin(p.bob) * 3;
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.translate(p.x, p.y + bobY);
        ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 16;
        // Background
        ctx.fillStyle = 'rgba(20,15,0,0.8)';
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
        // Border — gold pulsing
        ctx.strokeStyle = '#ffee00'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0;
        // Icon
        ctx.fillStyle = '#ffee00';
        ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('⚡', 0, 1);
        ctx.restore();
      }
    }

    function drawPremiumBar(x, y, w, h, pct, color) {
      ctx.save();
      ctx.fillStyle = 'rgba(0, 15, 30, 0.6)';
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 3);
      ctx.fill();
      ctx.stroke();

      if (pct > 0) {
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        // Inner fill
        ctx.roundRect(x + 1, y + 1, Math.max(0, (w - 2) * pct), h - 2, 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    // Draw invincible timer bar above player when active
    function drawInvincibleHUD() {
      players.forEach(p => {
        if (p.invincible <= 0 || p.dead) return;
        const barW = 50, barH = 6;
        const pct = p.invincible / INVINCIBLE_DURATION;
        const bx = p.x - barW / 2, by = p.y - p.h / 2 - 16;
        drawPremiumBar(bx, by, barW, barH, pct, '#ffee00');
      });
    }
    // ─── VIRTUAL JOYSTICK DRAWING ─────────────────────────────────
    function drawTouchJoystick() {
      if (!joystickVisible || !touchActive) return;
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = '#00ffc8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(joystickBaseX, joystickBaseY, 40, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 0.12;
      ctx.beginPath();
      ctx.moveTo(joystickBaseX, joystickBaseY);
      ctx.lineTo(joystickKnobX, joystickKnobY);
      ctx.stroke();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#00ffc8';
      ctx.shadowColor = '#00ffc8';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(joystickKnobX, joystickKnobY, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function showWaveAnnounce(text, fromNet = false) {
      if (isHost && isOnline && !fromNet) {
        netEvents.push({ t: 'ann', m: text });
      }
      const el = document.getElementById('wave-announce');
      el.textContent = text;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2000);
    }

    // ─── GAME LOOP ─────────────────────────────────────────────────
    let waveTimer = 0;
    const WAVE_INTERVAL = 420;

    function drawBackground() {
      // Deep sky
      const t = MAP_THEMES[currentMapTheme];
      const sg = ctx.createLinearGradient(0, 0, 0, H);
      sg.addColorStop(0, t.sky1);
      sg.addColorStop(1, t.sky2);
      ctx.fillStyle = sg;
      ctx.fillRect(0, 0, W, H);

      // Deep Planets
      for (const p of bgPlanets) {
         p.y += p.speed;
         if (p.y > H + p.r * 2) {
            p.y = -p.r * 2;
            p.x = Math.random() * W;
         }
         
         ctx.save();
         ctx.translate(p.x, p.y);
         
         // Planet body
         const pg = ctx.createRadialGradient(-p.r * 0.3, -p.r * 0.3, p.r * 0.1, 0, 0, p.r);
         pg.addColorStop(0, p.col1);
         pg.addColorStop(1, p.col2);
         ctx.fillStyle = pg;
         ctx.beginPath();
         ctx.arc(0, 0, p.r, 0, Math.PI * 2);
         ctx.fill();
         
         // Planetary Ring
         if (p.hasRing) {
            ctx.rotate(p.ringAngle);
            ctx.strokeStyle = p.ringColor;
            ctx.lineWidth = p.r * 0.2;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.r * 1.6, p.r * 0.3, 0, 0, Math.PI * 2);
            ctx.stroke();
         }
         ctx.restore();
      }

      // Ground layers
      for (let i = 0; i < groundLayers.length; i++) {
        const l = groundLayers[i];
        l.y += l.speed;
        if (l.y >= H) l.y -= H * 2;
        ctx.globalAlpha = l.alpha;
        ctx.drawImage(terrainCanvases[i % 2], 0, l.y, W, H);
        ctx.drawImage(terrainCanvases[i % 2], 0, l.y - H, W, H);
      }
      ctx.globalAlpha = 1;

      // Stars/environment particles
      for (const s of stars) {
        ctx.globalAlpha = s.alpha * 0.7;

        if (currentMapTheme === 0) {
          // Standard Stars
          s.y += s.speed * 0.3;
          if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        } else if (currentMapTheme === 1) {
          // Snowflakes / ice dust
          s.y += s.speed * 0.2;
          s.x += Math.cos(frameCount * 0.02 + s.y) * 0.2;
          if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
          if (s.x > W) s.x = 0; else if (s.x < 0) s.x = W;
          ctx.fillStyle = '#aaddff';
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 1.2, 0, Math.PI * 2);
          ctx.fill();
        } else if (currentMapTheme === 2) {
          // Hyper-warp lines
          s.y += s.speed * 2.5;
          if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
          ctx.strokeStyle = '#e040ff';
          ctx.lineWidth = s.r * 1.2;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x, s.y - s.speed * 5 - 2);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }

    const TARGET_FPS = 60;
    const FRAME_DURATION = 1000 / TARGET_FPS;
    let lastFrameTime = 0;
    let bossReinforceTimer = 0;
    const BOSS_REINFORCE_INTERVAL = 300; // send reinforcements every 5 seconds

    function applyNetworkState(st) {
        // ── Player reconciliation ──────────────────────────────────────────
        // Player 0 (host / P1): snap directly to authoritative state.
        // Player 1 (client / P2): use client-side prediction reconciliation —
        //   lerp our locally-predicted position toward the host's authoritative
        //   position so corrections are invisible rather than causing a snap.
        if (Array.isArray(st.p)) {
            for (let i = 0; i < st.p.length && i < players.length; i++) {
                const src = st.p[i];
                if (!isHost && i === 1 && !players[i].dead) {
                    // Soft-correct P2: pull 35% toward host position per tick.
                    const px = players[i].x + (src.x - players[i].x) * 0.35;
                    const py = players[i].y + (src.y - players[i].y) * 0.35;
                    Object.assign(players[i], src);
                    players[i].x = px; players[i].y = py;
                } else {
                    Object.assign(players[i], src);
                }
            }
        }
        // ── Sync bulk arrays in-place (all declared as const) ─────────────
        function syncArray(dest, src) {
            dest.length = 0;
            if (Array.isArray(src)) for (const item of src) dest.push(item);
        }
        syncArray(enemies, st.e);
        // Restore slim enemy field aliases (_t → type, _pat → pattern) for drawEnemy.
        // Also compute per-frame velocity estimate from the previous known position
        // so the client can extrapolate enemy movement between host packets.
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            if (e._t !== undefined) { e.type = e._t; e.pattern = e._pat; }
            const prev = _prevEnemyData[i];
            if (prev && !e.dead) {
                // Divide by 2 because host sends every 2 frames
                e._evx = (e.x - prev.x) / 2;
                e._evy = (e.y - prev.y) / 2;
            } else {
                e._evx = 0; e._evy = 0;
            }
        }
        // Save positions for next packet's velocity computation
        _prevEnemyData = enemies.map(e => ({ x: e.x, y: e.y }));
        syncArray(playerBullets,   st.pb);
        syncArray(enemyBullets,    st.eb);
        syncArray(enemyLasers,     st.el);
        syncArray(gunDrops,        st.gd);
        syncArray(heartPacks,      st.hp);
        syncArray(shieldDrops,     st.sd);
        syncArray(invinciblePacks, st.ip);
        
        score = st.sc.s; kills = st.sc.k; wave = st.sc.w; waveTimer = st.sc.wt;
        // Sync per-player scores that were computed on the host
        if (st.sc.p1s !== undefined) { players[0].score = st.sc.p1s; players[0].kills = st.sc.p1k || 0; }
        if (st.sc.p2s !== undefined) { players[1].score = st.sc.p2s; players[1].kills = st.sc.p2k || 0; }
        updateScoreHUD();
        if (st.sc.c !== currentMapTheme) setMapTheme(st.sc.c);
        if (st.sc.bm !== currentMusicMode) startMusic(st.sc.bm);
        
        for (const ev of st.ne) {
            if (ev.t === 'sfx') playSfx(ev.n, true);
            else if (ev.t === 'exp') spawnExplosion(ev.x, ev.y, ev.c, ev.b, true);
            else if (ev.t === 'ann') showWaveAnnounce(ev.m, true);
            else if (ev.t === 'hit') spawnHitEffect(ev.x, ev.y, true);
            else if (ev.t === 'hce') spawnHeartCollectEffect(ev.x, ev.y, true);
        }
        
        document.getElementById('scoreDisplay').textContent = score.toLocaleString();
        document.getElementById('killDisplay').textContent = kills;
        document.getElementById('waveDisplay').textContent = wave;
        updateHealthUI();

        // Signal that at least one full state has been received — unblock client rendering
        networkStateReady = true;
    }

    function gameLoop(timestamp) {
      if (!gameRunning) return;
      animId = requestAnimationFrame(gameLoop);

      if (isPaused) return;

      const elapsed = timestamp - lastFrameTime;
      if (elapsed < FRAME_DURATION - 2) return; // -2ms tolerance to avoid skipping frames
      lastFrameTime = timestamp;

      frameCount++;

      let didZoom = false;
      if (players[0].dead && players[1].dead) {
        didZoom = true;
        let pRef = players[0];
        if (coopMode) {
          // Focus camera on the player who just died (the smaller deathAnim timer)
          pRef = players[0].deathAnim < players[1].deathAnim ? players[0] : players[1];
        }
        
        const p = Math.max(0, Math.min(1, pRef.deathAnim / 120));
        const ease = p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2; // inOutQuart easing
        const zoom = 1 + ease * 1.5;
        const cx = W / 2 + (pRef.x - W / 2) * ease;
        const cy = H / 2 + (pRef.y - H / 2) * ease;

        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.scale(zoom, zoom);
        ctx.translate(-cx, -cy);
      }

      drawBackground();

      // ── CLIENT: show waiting screen until first host packet arrives ──
      if (!isHost && !networkStateReady) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#00ffc8';
        ctx.font = "bold 16px 'Orbitron', monospace";
        ctx.textAlign = 'center';
        ctx.fillText('CONNECTING TO HOST...', W / 2, H / 2);
        return;
      }

      if (isHost) {
        // Wave management — next wave triggers immediately after all enemies are killed
        const activeBoss = enemies.find(e => e.type.startsWith('boss'));
        if (activeBoss) {
          if (currentMusicMode !== activeBoss.type) {
            startMusic(activeBoss.type);
          }
        } else if (!activeBoss && currentMusicMode !== 'regular') {
          startMusic('regular');
        }
        if (enemies.length === 0) {
          bossReinforceTimer = 0;
          waveTimer++;
          if (waveTimer >= 90) {
            waveTimer = 0;
            wave++;
            document.getElementById('waveDisplay').textContent = wave;
            spawnWave();
            if (wave % 5 === 0) { showBossHpBar(); playSfx('bossAlarm'); }
          }
        } else {
          waveTimer = 0;
          // During boss fights, periodically send small reinforcements
          // Co-op: reinforcements are more frequent and heavier
          if (activeBoss) {
            bossReinforceTimer++;
            const reinforceInterval = coopMode
              ? Math.floor(BOSS_REINFORCE_INTERVAL * 0.55)  // 45% faster in co-op
              : BOSS_REINFORCE_INTERVAL;
            if (bossReinforceTimer >= reinforceInterval) {
              bossReinforceTimer = 0;
              const count = coopMode
                ? 3 + Math.floor(wave / 4)   // more reinforcements in co-op
                : 2 + Math.floor(wave / 5);
              for (let i = 0; i < Math.min(count, coopMode ? 8 : 5); i++) {
                const x = 40 + Math.random() * (W - 80);
                const y = -40 - i * 30;
                // In co-op: mix in tanks with the small reinforcements
                const rType = coopMode && i % 3 === 2 ? 'tank' : 'small';
                spawnEnemy(rType, x, y, Math.random() < 0.5 ? 'zigzag' : 'straight');
              }
              showWaveAnnounce(coopMode ? '⚡ ELITE REINFORCEMENTS!' : '⚡ REINFORCEMENTS!');
            }
          }
        }

        globalLaserTimer--;
        if (globalLaserTimer <= 0 && gameRunning) {
          // In co-op: lasers hit more often (shorter interval)
          const laserBase = coopMode ? 350 : 500;
          globalLaserTimer = laserBase + Math.random() * 400;
          // In co-op: fire TWO simultaneous lasers targeting each player
          if (coopMode) {
            const alivePlayers = players.filter(p => !p.dead);
            for (const tp of alivePlayers) {
              const lx = tp.x + (Math.random() * 60 - 30);
              spawnEnemyLaser(lx, -20, lx, H + 20, 100, 'random');
            }
          } else {
            let tp = players.filter(p => !p.dead).sort(() => Math.random() - 0.5)[0] || players[0];
            const lx = tp.x + (Math.random() * 80 - 40);
            spawnEnemyLaser(lx, -20, lx, H + 20, 100, 'random');
          }
        }

        updatePlayer();
        updateEnemies();
        updateBullets();
        updateParticles();
        updateHeartPacks();
        updateGunDrops();
        updateShieldDrops();
        updateInvinciblePacks();
        collide();
        
        if (isOnline && peerConn) {
           if (frameCount % 2 === 0) {  // 30 snapshots/sec (was 20)
               try {
                   const slimEnemies = enemies.map(e => ({
                     _t: e.type, _pat: e.pattern,
                     x: e.x, y: e.y, hp: e.hp, timer: e.timer, phase: e.phase,
                     shootTimer: e.shootTimer, burstCount: e.burstCount,
                     burstCooldown: e.burstCooldown, dead: e.dead,
                     deathAnim: e.deathAnim || 0, hitFlash: e.hitFlash || 0,
                     laserCd: e.laserCd, burstMode: e.burstMode,
                     w: e.w, h: e.h, maxHp: e.maxHp, speed: e.speed, speed2: e.speed2,
                     shootInterval: e.shootInterval, burstMax: e.burstMax,
                   }));
                   const slimPB = playerBullets.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, type: b.type, color: b.color, w: b.w, h: b.h }));
                   const slimEB = enemyBullets.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, type: b.type, r: b.r }));
                   const slimPlayers = players.map(p => ({
                     x: p.x, y: p.y, hp: p.hp, maxHp: p.maxHp, shields: p.shields,
                     gunLevel: p.gunLevel, baseGunLevel: p.baseGunLevel, gunTimer: p.gunTimer,
                     shootInterval: p.shootInterval, invincible: p.invincible, thrustAnim: p.thrustAnim,
                     dead: p.dead, deathAnim: p.deathAnim || 0, laserTargetY: p.laserTargetY || 0,
                     shield: p.shield, shieldAnim: p.shieldAnim || 0,
                   }));
                   hostSeq++;
                   peerConn.send({
                      t: 's',
                      seq: hostSeq,  // Sequence number for out-of-order rejection
                      p: {
                         p: slimPlayers, e: slimEnemies, pb: slimPB, eb: slimEB,
                         el: enemyLasers, gd: gunDrops, hp: heartPacks,
                         sd: shieldDrops, ip: invinciblePacks,
                         sc: { s: score, k: kills, w: wave, wt: waveTimer, c: currentMapTheme, h1: players[0].hp, h2: players[1].hp, bm: currentMusicMode,
                               p1s: players[0].score, p2s: players[1].score, p1k: players[0].kills, p2k: players[1].kills },
                         ne: netEvents
                      }
                   });
                   if (netEvents.length > 0) netEvents = [];
               } catch(err) { console.error('Host send error:', err); }
           }
        }
      } else {
        // ══════════════════════════════════════════════════════════════
        // CLIENT MODE — smooth prediction & extrapolation
        // ══════════════════════════════════════════════════════════════

        // 1. CLIENT-SIDE PREDICTION: move Player 2 (our ship) locally every
        //    frame so control feels instant, with no round-trip latency.
        //    The host's authoritative position is reconciled softly in
        //    applyNetworkState (35% lerp), so corrections are invisible.
        if (!players[1].dead) {
          let cdx = 0, cdy = 0;
          // Online client is always Player 2 — uses Arrow keys
          if (keys['ArrowLeft'])  cdx -= 1;
          if (keys['ArrowRight']) cdx += 1;
          if (keys['ArrowUp'])    cdy -= 1;
          if (keys['ArrowDown'])  cdy += 1;
          if (touchActive) {
            players[1].x += touchDX;
            players[1].y += touchDY;
          }
          if (cdx !== 0 && cdy !== 0) { cdx *= 0.707; cdy *= 0.707; }
          const spd = players[1].speed || 9;
          players[1].x = Math.max(players[1].w / 2, Math.min(W - players[1].w / 2, players[1].x + cdx * spd));
          players[1].y = Math.max(players[1].h / 2, Math.min(H - players[1].h / 2, players[1].y + cdy * spd));
          players[1].thrustAnim = (players[1].thrustAnim || 0) + 1;
        }

        // 2. BULLET EXTRAPOLATION: bullets travel in straight lines,
        //    so advancing by vx/vy each frame is perfectly accurate.
        for (const b of playerBullets) { b.x += b.vx || 0; b.y += b.vy || 0; }
        for (const b of enemyBullets)  { b.x += b.vx || 0; b.y += b.vy || 0; }

        // 3. ENEMY POSITION EXTRAPOLATION: glide enemies toward where
        //    they are heading using velocity estimated from last two packets.
        for (const e of enemies) {
          if (!e.dead) {
            e.x += e._evx || 0;
            e.y += e._evy || 0;
          }
        }

        // 4. LOCAL TIMER ANIMATIONS
        for (const L of enemyLasers) {
          if (L.warningTimer > 0) L.warningTimer--;
          else if (L.fireTimer > 0) L.fireTimer--;
        }
        updateParticles();

        // 5. SEND INPUTS to host every 2 frames (30/sec)
        if (peerConn && frameCount % 2 === 0) {
            try {
                if (peerConn.open !== false) {
                   // Send only truthy key entries — avoids bloat and serialization edge cases
                   const activeKeys = {};
                   for (const k in keys) { if (keys[k]) activeKeys[k] = true; }
                   peerConn.send({
                      t: 'i',
                      p: { keys: activeKeys, tX: touchDX, tY: touchDY, tA: touchActive }
                   });
                }
            } catch(err) { console.error('Client send error:', err); }
        }
      }

      // Draw order
      drawPlayerBullets();
      drawPlayerLaser();
      drawEnemyBullets();
      drawEnemyLasers();
      for (const e of enemies) drawEnemy(e);
      drawHeartPacks();
      drawGunDrops();
      drawShieldDrops();
      drawInvinciblePacks();
      drawParticles();
      drawShield();
      drawPlayer();

      if (didZoom) {
        ctx.restore();
      }

      drawInvincibleHUD();
      drawTouchJoystick();
      updateGunUI();
    }

    // ─── GAME OVER ─────────────────────────────────────────────────
    function triggerGameOver() {
      gameRunning = false;
      if (isOnline && isHost && peerConn && peerConn.open) {
          peerConn.send({ t: 'gO' });
      }
      document.getElementById('pauseBtnMain').classList.remove('visible');
      stopMusic();
      players.forEach(p => spawnExplosion(p.x, p.y, 40, true));
      playSfx('gameOver');

      setTimeout(() => {
        const overlay = document.getElementById('overlay');
        overlay.classList.remove('hidden');
        document.getElementById('startBtn').textContent = 'RETRY SOLO';
        if (coopMode) document.getElementById('coopBtn').textContent = 'RETRY CO-OP';
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('coopBtn').style.display = 'inline-block';
        document.getElementById('menuBtn').style.display = 'inline-block';
        document.getElementById('titleLine1').textContent = 'GAME';
        document.getElementById('titleLine2').textContent = 'OVER';
        document.getElementById('titleSub').textContent = 'MISSION FAILED';
        document.getElementById('finalScore').style.display = 'block';
        document.getElementById('finalScoreLabel').style.display = 'block';
        document.getElementById('finalScore').textContent = score.toLocaleString();
        document.getElementById('finalKills').style.display = 'block';
        document.getElementById('finalKillsLabel').style.display = 'block';
        document.getElementById('finalKills').textContent = kills;

        if (coopMode) {
          // Show per-player score breakdown
          document.getElementById('finalCoopScores').style.display = 'block';
          document.getElementById('finalP1Score').textContent = 'P1 — ' + players[0].score.toLocaleString() + ' (' + players[0].kills + ' kills)';
          document.getElementById('finalP2Score').textContent = 'P2 — ' + players[1].score.toLocaleString() + ' (' + players[1].kills + ' kills)';
          const winner = players[0].score > players[1].score ? '🏆 Player 1 wins the score!' :
                         players[1].score > players[0].score ? '🏆 Player 2 wins the score!' : '🤝 It\'s a tie!';
          document.getElementById('finalWinner').textContent = winner;
        } else {
          document.getElementById('finalCoopScores').style.display = 'none';
        }
      }, 1200);
    }

    // ─── START GAME ────────────────────────────────────────────────
    function startGame() {
      // Reset
      score = 0; kills = 0; wave = 1; frameCount = 0; waveTimer = 0;
      players.forEach(p => { p.score = 0; p.kills = 0; }); // reset per-player scores
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('p1ScoreDisplay').textContent = '0';
      document.getElementById('p2ScoreDisplay').textContent = '0';
      document.getElementById('killDisplay').textContent = '0';
      document.getElementById('finalCoopScores').style.display = 'none';
      updateScoreHUD(); // switch HUD display mode based on coopMode
      document.getElementById('waveDisplay').textContent = '1';
      document.getElementById('bossHpBar').style.display = 'none';

      enemies.length = 0;
      playerBullets.length = 0;
      enemyBullets.length = 0;
      enemyLasers.length = 0;
      globalLaserTimer = 400;
      particles.length = 0;
      heartPacks.length = 0;
      gunDrops.length = 0;
      shieldDrops.length = 0;
      invinciblePacks.length = 0;
      bossReinforceTimer = 0;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      // Reset overlay titles
      document.getElementById('titleLine1').textContent = 'SPACE';
      document.getElementById('titleLine2').textContent = 'JET';
      document.getElementById('titleSub').textContent = 'ARCADE SHOOTER';
      document.getElementById('finalScore').style.display = 'none';
      document.getElementById('finalScoreLabel').style.display = 'none';
      document.getElementById('finalKills').style.display = 'none';
      document.getElementById('finalKillsLabel').style.display = 'none';
      document.getElementById('startBtn').textContent = 'SOLO MODE';
      document.getElementById('coopBtn').textContent = 'CO-OP MODE';
      document.getElementById('menuBtn').style.display = 'none';

      resetPlayer();
      if (!coopMode) {
        players[1].dead = true;
        players[1].hp = 0;
        players[1].deathAnim = 999;
        document.getElementById('p2HealthBlock').style.display = 'none';
        document.getElementById('p2GunBlock').style.display = 'none';
        document.getElementById('p1HealthLabel').textContent = 'Health';
        document.getElementById('p1GunBlock').style.width = '100%';
      } else {
        document.getElementById('p2HealthBlock').style.display = 'flex';
        document.getElementById('p2GunBlock').style.display = 'block';
        document.getElementById('p1HealthLabel').textContent = 'P1 Health';
        document.getElementById('p1GunBlock').style.width = '48%';
      }

      updateHealthUI();

      document.getElementById('overlay').classList.add('hidden');

      if (animId) cancelAnimationFrame(animId);
      gameRunning = true;
      lastFrameTime = 0;
      isPaused = false;
      document.getElementById('pauseOverlay').style.display = 'none';
      document.getElementById('pauseBtnMain').classList.add('visible');
      stopMusic();

      // Only the HOST runs game logic and spawns the first wave.
      // The CLIENT waits for state from the host — do NOT call spawnWave() on client.
      if (isHost) {
        startMusic();
        spawnWave();
        networkStateReady = true; // Host is always ready
      } else {
        // Client starts music and waits for first host packet
        networkStateReady = false;
        enemies.length = 0;
        enemyBullets.length = 0;
        playerBullets.length = 0;
        startMusic();
      }

      canvas.focus(); // Ensure canvas captures all keyboard events (Arrow keys etc.)
      animId = requestAnimationFrame(gameLoop);
    }

    // ─── FULLSCREEN SUPPORT ──────────────────────────────────────
    function toggleFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
      }
    }

    const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 800);

    function requestMobileFullscreen() {
      if (isMobile && !document.fullscreenElement) {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
        if (req) req.call(el).catch(() => { });
      }
    }

    if (isMobile && screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(() => { });
    }

    let coopMode = false;

    document.getElementById('startBtn').addEventListener('click', () => {
      coopMode = false;
      requestMobileFullscreen();
      startGame();
    });

    document.getElementById('coopBtn').addEventListener('click', () => {
      coopMode = true;
      requestMobileFullscreen();
      startGame();
    });

    document.getElementById('onlineBtn').addEventListener('click', () => {
      requestMobileFullscreen();
      initPeerHost();
    });

    // ─── RETURN TO MENU ──────────────────────────────────────────
    function returnToMenu() {
      gameRunning = false;
      document.getElementById('pauseBtnMain').classList.remove('visible');
      if (animId) cancelAnimationFrame(animId);
      stopMusic();
      enemies.length = 0;
      playerBullets.length = 0;
      enemyBullets.length = 0;
      enemyLasers.length = 0;
      particles.length = 0;
      heartPacks.length = 0;
      gunDrops.length = 0;
      shieldDrops.length = 0;
      invinciblePacks.length = 0;

      document.getElementById('titleLine1').textContent = 'SPACE';
      document.getElementById('titleLine2').textContent = 'JET';
      document.getElementById('titleSub').textContent = 'ARCADE SHOOTER';
      document.getElementById('finalScore').style.display = 'none';
      document.getElementById('finalScoreLabel').style.display = 'none';
      document.getElementById('finalKills').style.display = 'none';
      document.getElementById('finalKillsLabel').style.display = 'none';
      document.getElementById('startBtn').textContent = 'SOLO MODE';
      document.getElementById('coopBtn').textContent = 'CO-OP MODE';
      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('coopBtn').style.display = 'inline-block';
      document.getElementById('menuBtn').style.display = 'none';
      document.getElementById('bossHpBar').style.display = 'none';
      document.getElementById('overlay').classList.remove('hidden');
    }

    document.getElementById('menuBtn').addEventListener('click', returnToMenu);
  </script>
</body>
